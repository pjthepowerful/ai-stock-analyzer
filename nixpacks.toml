# Railway / Nixpacks config for Paula's backend.
# requirements.txt at the repo root lets Nixpacks auto-detect Python and install
# deps with the correct pip. trading.py + signal_logic.py live at root; the
# FastAPI app is in desktop/backend (engine.py adds root to sys.path on import).

[start]
cmd = "cd desktop/backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
