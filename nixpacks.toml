# Railway / Nixpacks build config for Paula's backend.
# trading.py + signal_logic.py live at the repo root; the FastAPI app lives in
# desktop/backend. We install the backend's requirements and start uvicorn from
# there (engine.py adds the repo root to sys.path so root-level modules import).

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r desktop/backend/requirements.txt"]

[start]
cmd = "cd desktop/backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
