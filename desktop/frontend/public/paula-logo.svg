<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Paula logo">
  <defs>
    <linearGradient id="pl-grn" x1="120" y1="120" x2="400" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4ade80"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="pl-tile" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1c1f26"/>
      <stop offset="1" stop-color="#0e1013"/>
    </linearGradient>
    <linearGradient id="pl-line" x1="120" y1="360" x2="400" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Rounded tile -->
  <rect x="48" y="48" width="416" height="416" rx="104" fill="url(#pl-tile)" stroke="#2a2f38" stroke-width="2"/>

  <!-- The P -->
  <path d="M150 132
           h120
           a86 86 0 0 1 0 172
           h-70
           v76
           h-50
           Z
           M200 180
           v76
           h66
           a38 38 0 0 0 0 -76
           Z"
        fill="url(#pl-grn)" fill-rule="evenodd"/>

  <!-- Rising bars (bottom-left) -->
  <g fill="url(#pl-grn)">
    <rect x="196" y="356" width="26" height="40" rx="6"/>
    <rect x="236" y="332" width="26" height="64" rx="6"/>
    <rect x="276" y="300" width="26" height="96" rx="6"/>
  </g>
</svg>
