<style>

  .sub { color: #8a8aa0; font-size: 14px; margin-bottom: 22px; }
  .controls { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
  .seg { display: inline-flex; background: #16161f; border: 1px solid #2a2a38; border-radius: 10px; padding: 4px; }
  .seg button { background: none; border: none; color: #8a8aa0; font: inherit; font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 7px; cursor: pointer; transition: .15s; }

  .stage { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }

  .frame { border-radius: 16px; overflow: hidden; border: 1px solid #23232e; }
  .frame-label { font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #62627a; padding: 0 0 8px 2px; }
  .hidden { display: none !important; }
  .note { margin-top: 22px; color: #8a8aa0; font-size: 13px; line-height: 1.6; max-width: 760px; }
  .note b { color: #c8c8d8; }
</style>

  NOTE.innerHTML = NOTES[style];
}
document.getElementById('styleSeg').addEventListener('click',e=>{ if(e.target.dataset.style){ style=e.target.dataset.style; [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target)); render(); }});
document.getElementById('screenSeg').addEventListener('click',e=>{ if(e.target.dataset.screen){ screen=e.target.dataset.screen; [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target)); render(); }});
render();
</script>
</body>
