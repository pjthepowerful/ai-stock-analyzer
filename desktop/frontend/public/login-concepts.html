<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Paula · Login Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0}
  body{background:#08080c;color:#ececf2;font-family:'DM Sans',system-ui,sans-serif;padding:28px}
  h1{font-size:22px;font-weight:700;margin-bottom:4px}
  .sub{color:#8a8a9a;font-size:14px;margin-bottom:22px}
  .seg{display:inline-flex;background:#14141c;border:1px solid #26262f;border-radius:10px;padding:4px;margin-bottom:24px;flex-wrap:wrap}
  .seg button{background:none;border:none;color:#8a8a9a;font:inherit;font-size:13px;font-weight:500;padding:8px 16px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.on{background:#10b981;color:#04130d}
  .frame{border-radius:16px;overflow:hidden;border:1px solid #23232e;max-width:880px}
  .flabel{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#52525f;padding:0 0 8px 2px}
  .note{margin-top:20px;color:#8a8a9a;font-size:13px;line-height:1.6;max-width:760px}
  .note b{color:#c8c8d8}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes tape{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .cursor{display:inline-block;width:8px;height:17px;background:#10b981;margin-left:2px;animation:blink 1s infinite;vertical-align:-2px}
</style>
</head>
<body>
<h1>Paula · Login concepts</h1>
<div class="sub">Three bolder directions — dark, green, matching the hybrid chat. Flip and tell me which surprises you (good).</div>
<div class="seg" id="seg">
  <button data-c="fused" class="on">★ Fused (both)</button>
  <button data-c="convo">Paula's already talking</button>
  <button data-c="tape">Living terminal</button>
  <button data-c="statement">Big statement</button>
</div>
<div id="render"></div>
<div class="note" id="note"></div>

<script>
const R=document.getElementById('render'), NOTE=document.getElementById('note');
let c='fused';

function convo(){ return `
<div class="frame"><div style="height:580px;background:#0d0d13;display:flex;font-family:'DM Sans'">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:0 8%;gap:18px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="width:30px;height:30px;border-radius:9px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700">P</span><span style="font-weight:600">Paula</span><span style="font-size:11px;color:#10b981;margin-left:6px">● online</span></div>
    <div style="align-self:flex-start;display:flex;gap:11px;max-width:88%">
      <span style="width:26px;height:26px;border-radius:50%;background:#1d9e75;color:#04130d;display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0">P</span>
      <div style="background:#16161f;border:1px solid #23232e;border-radius:4px 14px 14px 14px;padding:12px 15px;font-size:15px;line-height:1.5">Hey 👋 I'm Paula — your swing-trading copilot.<br><span style="color:#8a8a9a">Sign in and let's find your next setup.</span></div>
    </div>
    <div style="align-self:flex-start;display:flex;gap:11px;max-width:88%;animation:float 4s ease-in-out infinite">
      <span style="width:26px;height:26px;flex-shrink:0"></span>
      <div style="background:#16161f;border:1px solid #23232e;border-radius:14px;padding:16px;width:330px">
        <input disabled placeholder="Email" style="width:100%;height:42px;border:1px solid #2a2a35;border-radius:10px;background:#0d0d13;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:9px"/>
        <input disabled placeholder="Password" style="width:100%;height:42px;border:1px solid #2a2a35;border-radius:10px;background:#0d0d13;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:13px"/>
        <div style="height:44px;border-radius:10px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:600;font-size:14px">Sign in →</div>
      </div>
    </div>
    <div style="align-self:flex-start;color:#62627a;font-size:13px;margin-left:37px">New here? <span style="color:#10b981;font-weight:500">Create an account</span> — takes 30 seconds<span class="cursor"></span></div>
  </div>
</div></div>`; }

function tape(){ const ticks=['NVDA +1.8%','XOM +0.9%','AAPL +0.4%','TSLA −1.2%','AMD +2.1%','SPY −0.3%','MSFT +0.7%','META +1.1%']; const row=ticks.map(t=>`<span style="color:${t.includes('−')?'#ef4444':'#10b981'};margin:0 22px;font-family:'JetBrains Mono';font-size:13px">${t}</span>`).join(''); return `
<div class="frame"><div style="height:580px;background:#0a0a0f;position:relative;overflow:hidden;font-family:'DM Sans';display:grid;place-items:center">
  <div style="position:absolute;inset:0;opacity:.5">
    <div style="position:absolute;top:14%;white-space:nowrap;animation:tape 30s linear infinite">${row}${row}</div>
    <div style="position:absolute;top:82%;white-space:nowrap;animation:tape 38s linear infinite reverse">${row}${row}</div>
  </div>
  <svg viewBox="0 0 880 580" style="position:absolute;inset:0;width:100%;height:100%;opacity:.16"><polyline points="0,440 80,420 160,430 240,380 320,400 400,330 480,350 560,280 640,300 720,230 800,250 880,180" fill="none" stroke="#10b981" stroke-width="2"/><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#10b981" stop-opacity=".25"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></linearGradient><polygon points="0,440 80,420 160,430 240,380 320,400 400,330 480,350 560,280 640,300 720,230 800,250 880,180 880,580 0,580" fill="url(#g)"/></svg>
  <div style="position:relative;z-index:2;width:360px;background:rgba(16,16,22,.82);backdrop-filter:blur(12px);border:1px solid #23232e;border-radius:18px;padding:32px 30px;text-align:center">
    <span style="width:36px;height:36px;border-radius:10px;background:#10b981;color:#04130d;display:inline-grid;place-items:center;font-weight:700;font-size:18px;margin-bottom:16px">P</span>
    <div style="font-size:23px;font-weight:700;letter-spacing:-.01em">Welcome back</div>
    <div style="font-size:13px;color:#8a8a9a;margin:6px 0 22px">The market's moving. Let's get to work.</div>
    <input disabled placeholder="Email" style="width:100%;height:46px;border:1px solid #2a2a35;border-radius:11px;background:#0d0d13;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:10px"/>
    <input disabled placeholder="Password" style="width:100%;height:46px;border:1px solid #2a2a35;border-radius:11px;background:#0d0d13;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:16px"/>
    <div style="height:46px;border-radius:11px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:600">Sign in →</div>
    <div style="font-size:13px;color:#62627a;margin-top:14px">New to Paula? <span style="color:#10b981">Create account</span></div>
  </div>
</div></div>`; }

function statement(){ return `
<div class="frame"><div style="height:580px;background:#0b0b10;display:flex;font-family:'DM Sans'">
  <div style="flex:1.25;padding:54px 50px;display:flex;flex-direction:column;justify-content:space-between;background:radial-gradient(700px 420px at 20% 30%,rgba(16,185,129,.10),transparent 60%)">
    <div style="display:flex;align-items:center;gap:10px"><span style="width:30px;height:30px;border-radius:9px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700">P</span><span style="font-weight:600">Paula</span></div>
    <div>
      <div style="font-size:54px;font-weight:800;line-height:1.04;letter-spacing:-.03em">Markets don't<br>sleep.<br><span style="color:#10b981">Neither does<br>Paula.</span></div>
      <div style="font-size:16px;color:#8a8a9a;margin-top:22px;max-width:380px;line-height:1.5">Your AI swing-trading copilot finds the setups, holds for the move, and watches the tape so you don't have to.</div>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">${['Named setups','Live news','Autopilot','Always-on'].map(t=>`<span style="font-size:12px;color:#9a9aaa;border:1px solid #26262f;border-radius:999px;padding:6px 13px">${t}</span>`).join('')}</div>
  </div>
  <div style="width:380px;border-left:1px solid #1a1a22;padding:0 42px;display:flex;flex-direction:column;justify-content:center;background:#0e0e14">
    <div style="font-size:22px;font-weight:700;margin-bottom:4px">Sign in</div>
    <div style="font-size:13px;color:#8a8a9a;margin-bottom:24px">Pick up where you left off.</div>
    <input disabled placeholder="Email" style="width:100%;height:46px;border:1px solid #2a2a35;border-radius:11px;background:#0a0a0f;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:11px"/>
    <input disabled placeholder="Password" style="width:100%;height:46px;border:1px solid #2a2a35;border-radius:11px;background:#0a0a0f;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:18px"/>
    <div style="height:46px;border-radius:11px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:600">Sign in →</div>
    <div style="font-size:13px;color:#62627a;margin-top:16px;text-align:center">New to Paula? <span style="color:#10b981">Create account</span></div>
  </div>
</div></div>`; }

function fused(){ const ticks=['NVDA +1.8%','XOM +0.9%','AAPL +0.4%','TSLA −1.2%','AMD +2.1%','SPY −0.3%','MSFT +0.7%','META +1.1%']; const row=ticks.map(t=>`<span style="color:${t.includes('−')?'#ef4444':'#10b981'};margin:0 22px;font-family:'JetBrains Mono';font-size:12px">${t}</span>`).join(''); return `
<div class="frame"><div style="height:580px;background:#0b0b10;display:flex;font-family:'DM Sans';position:relative;overflow:hidden">
  <div style="position:absolute;inset:0;opacity:.4;pointer-events:none">
    <div style="position:absolute;top:10%;white-space:nowrap;animation:tape 32s linear infinite">${row}${row}</div>
    <div style="position:absolute;bottom:7%;white-space:nowrap;animation:tape 40s linear infinite reverse">${row}${row}</div>
  </div>
  <svg viewBox="0 0 880 580" style="position:absolute;inset:0;width:100%;height:100%;opacity:.14;pointer-events:none"><polyline points="0,460 90,440 180,450 270,390 360,410 450,330 540,355 630,270 720,295 810,210 880,180" fill="none" stroke="#10b981" stroke-width="2"/><linearGradient id="gf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#10b981" stop-opacity=".22"/><stop offset="1" stop-color="#10b981" stop-opacity="0"/></linearGradient><polygon points="0,460 90,440 180,450 270,390 360,410 450,330 540,355 630,270 720,295 810,210 880,180 880,580 0,580" fill="url(#gf)"/></svg>
  <div style="position:relative;z-index:2;flex:1.25;padding:50px 48px;display:flex;flex-direction:column;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:10px"><span style="width:30px;height:30px;border-radius:9px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700">P</span><span style="font-weight:600">Paula</span><span style="font-size:11px;color:#10b981;margin-left:4px;font-family:'JetBrains Mono'">● LIVE</span></div>
    <div>
      <div style="font-size:52px;font-weight:800;line-height:1.05;letter-spacing:-.03em">Markets don't<br>sleep.<br><span style="color:#10b981">Neither does<br>Paula.</span></div>
      <div style="font-size:16px;color:#9a9aaa;margin-top:20px;max-width:380px;line-height:1.5">Your AI swing-trading copilot finds the setups, holds for the move, and watches the tape so you don't have to.</div>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap">${['Named setups','Live news','Autopilot','Always-on'].map(t=>`<span style="font-size:12px;color:#9a9aaa;border:1px solid #2a2a35;border-radius:999px;padding:6px 13px;background:rgba(12,12,18,.6)">${t}</span>`).join('')}</div>
  </div>
  <div style="position:relative;z-index:2;width:372px;padding:0 40px;display:flex;flex-direction:column;justify-content:center">
    <div style="background:rgba(15,15,21,.82);backdrop-filter:blur(14px);border:1px solid #26262f;border-radius:18px;padding:30px 28px">
      <div style="font-size:22px;font-weight:700;margin-bottom:4px">Welcome back</div>
      <div style="font-size:13px;color:#8a8a9a;margin-bottom:22px">The market's moving. Let's get to work.</div>
      <input disabled placeholder="Email" style="width:100%;height:46px;border:1px solid #2a2a35;border-radius:11px;background:#0a0a0f;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:10px"/>
      <input disabled placeholder="Password" style="width:100%;height:46px;border:1px solid #2a2a35;border-radius:11px;background:#0a0a0f;color:#ececf2;padding:0 14px;font:inherit;font-size:14px;margin-bottom:16px"/>
      <div style="height:46px;border-radius:11px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:600">Sign in →</div>
      <div style="font-size:13px;color:#62627a;margin-top:14px;text-align:center">New to Paula? <span style="color:#10b981">Create account</span></div>
    </div>
  </div>
</div></div>`; }

const V={convo,tape,statement,fused};
const N={
  convo:`<b>Paula's already talking.</b> The login <i>is</i> a conversation — Paula greets you and the form arrives as the next message in the thread (it gently floats). You're using the product before you've even signed in. Ties straight into the hybrid chat you liked.`,
  tape:`<b>Living terminal.</b> A faint live ticker tape scrolls and an equity curve breathes behind a frosted, focused card. Atmospheric and alive — feels like stepping onto a trading floor, without clutter.`,
  statement:`<b>Big statement.</b> Oversized confident typography owns the left ("Markets don't sleep. Neither does Paula."), form sits clean on the right. Editorial, bold, memorable — a real hero moment.`,
  fused:`<b>★ Big statement + Living terminal (fused).</b> Both of your favorites combined: the bold headline owns the left, the form sits in a frosted glass card on the right, and the living ticker tape + breathing equity curve move behind everything. Bold AND alive — the full vision.`,
};
function render(){ R.innerHTML=`<div class="flabel">${({fused:'Big statement + Living terminal',convo:"Paula's already talking",tape:'Living terminal',statement:'Big statement'})[c]}</div>`+V[c](); NOTE.innerHTML=N[c]; }
document.getElementById('seg').addEventListener('click',e=>{ if(e.target.dataset.c){ c=e.target.dataset.c; [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target)); render(); }});
render();
</script>
</body>
</html>
