<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hey Paula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-2: #141420;
      --fg: #eaeaf2;
      --muted: #7a7a96;
      --accent: #10b981;
      --accent-on: #050507;
      --down: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      background: #000; color: var(--fg);
      font: 16px/1.5 "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .mono { font-family: "Geist Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); border-radius: 22%;
      font-family: "Geist Mono", monospace; font-weight: 800;
      color: var(--accent-on); font-size: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel">
  const DUR = 20;

  // Each prompt has a matching short Paula reply.
  const EXCHANGES = [
    { q: "Hey Paula, can I hold NVDA?",      a: "Yes — momentum's intact. Trail your stop below the 20-EMA." },
    { q: "Hey Paula, what's the play today?", a: "Tech leading. SPY breadth improving — let winners run." },
    { q: "Hey Paula, find me a breakout.",    a: "AMD is setting up. R/R 2.6×, score 78. Entry on a VWAP reclaim." },
    { q: "Hey Paula, hedge my book.",         a: "Reduce tech by 20%. Your sector concentration is 68%." },
    { q: "Hey Paula, recap my week.",         a: "Up +$1,284. 64% win rate. NVDA and PLTR carried." },
    { q: "Hey Paula, size this trade.",       a: "Risk 1% of equity — 45 shares with a 3× ATR stop." },
  ];

  // ── Background ─────────────────────────────────────────────────────────
  function Bg() {
    const { time } = useTimeline();
    const drift = Math.sin(time * 0.3) * 40;
    return (
      <div style={{
        position: "absolute", inset: 0,
        background:
          `radial-gradient(900px 600px at ${60 + drift / 5}% ${30 - drift / 8}%, rgba(16,185,129,0.18) 0%, transparent 60%),` +
          `radial-gradient(900px 600px at ${30 - drift / 6}% ${85 + drift / 10}%, rgba(16,185,129,0.09) 0%, transparent 60%),` +
          "var(--bg)",
      }} />
    );
  }

  // ── Scene 1a: brand intro — mark + "Paula" wordmark (0 – 2.8) ─────────
  function Scene1a() {
    const { time } = useTimeline();
    const sceneOp = animate({ from: 0, to: 1, start: 0.0, end: 0.5 })(time)
                  * (1 - animate({ from: 0, to: 1, start: 2.4, end: 2.8 })(time));

    const markScale = animate({ from: 0.7, to: 1, start: 0.2, end: 1.0, ease: Easing.easeOutBack })(time);
    const markOp    = animate({ from: 0, to: 1, start: 0.2, end: 0.8, ease: Easing.easeOutCubic })(time);
    const wordOp    = animate({ from: 0, to: 1, start: 0.8, end: 1.6, ease: Easing.easeOutCubic })(time);
    const wordY     = animate({ from: 22, to: 0, start: 0.8, end: 1.6, ease: Easing.easeOutCubic })(time);
    const pulse     = 1 + 0.03 * Math.sin((time - 0.2) * 3.0);

    return (
      <div style={{
        position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: sceneOp,
      }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 32 }}>
          <span className="brand-mark" style={{
            width: 160, height: 160, borderRadius: 36, fontSize: 72,
            transform: `scale(${markScale * pulse})`,
            opacity: markOp,
            boxShadow: "0 0 80px rgba(16,185,129,0.45)",
          }}>P</span>
          <div style={{
            fontSize: 156, fontWeight: 600, letterSpacing: "-0.05em", lineHeight: 1,
            opacity: wordOp, transform: `translateY(${wordY}px)`, color: "var(--fg)",
          }}>
            Paula
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 1b: chat — first exchange types out, then prompts cycle (2.8 – 10.7) ──
  function Scene1b() {
    const { time } = useTimeline();
    const enterOp = animate({ from: 0, to: 1, start: 2.8, end: 3.4, ease: Easing.easeOutCubic })(time);
    const enterY  = animate({ from: 30, to: 0, start: 2.8, end: 3.4, ease: Easing.easeOutCubic })(time);
    const exitOp  = 1 - animate({ from: 0, to: 1, start: 10.2, end: 10.7 })(time);
    const op = enterOp * exitOp;

    // ── First exchange — typing animation ───────────────────────────────
    // User bubble fades in 3.2 → 3.9
    const userOp = animate({ from: 0, to: 1, start: 3.2, end: 3.9, ease: Easing.easeOutCubic })(time);
    const userY  = animate({ from: 18, to: 0, start: 3.2, end: 3.9, ease: Easing.easeOutCubic })(time);

    // Paula avatar appears at 4.2; typing dots 4.2 → 5.0; then stream starts
    const avatarOp = animate({ from: 0, to: 1, start: 4.2, end: 4.6 })(time);
    const typingOp = animate({ from: 0, to: 1, start: 4.4, end: 4.7 })(time)
                   * (1 - animate({ from: 0, to: 1, start: 4.9, end: 5.1 })(time));

    const firstReply = EXCHANGES[0].a;
    const streamT = animate({ from: 0, to: 1, start: 5.1, end: 6.9, ease: Easing.linear })(time);
    const shownReply = firstReply.slice(0, Math.floor(streamT * firstReply.length));
    const showCaret = time > 5.1 && streamT < 1 && (Math.floor(time * 2) % 2 === 0);
    const replyStarted = time > 5.0;

    // ── Cycle through prompts 2..N starting at 7.4 ──────────────────────
    // Each cycle: flip user bubble (rotateX) + static reply swap.
    const CYCLE_START = 7.4;
    const DWELL = 0.7;
    const cycleCount = EXCHANGES.length - 1;
    let cycleIdx = -1;
    let localT = 0;
    if (time >= CYCLE_START) {
      const t = time - CYCLE_START;
      cycleIdx = Math.min(cycleCount - 1, Math.floor(t / DWELL));
      localT = (t - cycleIdx * DWELL) / DWELL;
    }
    // Flip in/out for cycling
    const flipIn  = Math.min(1, Math.max(0, localT / 0.22));
    const flipOut = cycleIdx === cycleCount - 1
      ? 0
      : Math.min(1, Math.max(0, (localT - 0.78) / 0.22));
    const rotX = -90 * (1 - Easing.easeOutCubic(flipIn)) + 90 * Easing.easeInCubic(flipOut);
    const cycleOpacity = flipIn * (1 - flipOut);

    // Active exchange (q/a)
    const inCycle = cycleIdx >= 0;
    const activeQ = inCycle ? EXCHANGES[cycleIdx + 1].q : EXCHANGES[0].q;
    const activeA = inCycle ? EXCHANGES[cycleIdx + 1].a : shownReply;

    return (
      <div style={{
        position: "absolute", inset: 0, display: "grid", placeItems: "center",
        opacity: op,
      }}>
        <div style={{
          width: 1100, maxWidth: "92%",
          background: "var(--bg-2)",
          border: "1px solid rgba(255,255,255,0.08)",
          borderRadius: 28,
          padding: "36px 40px",
          boxShadow: "0 40px 100px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02) inset",
          display: "flex", flexDirection: "column", gap: 32,
          transform: `translateY(${enterY}px)`,
        }}>
          {/* user bubble — fades in first time, flips on cycle */}
          <div style={{ alignSelf: "flex-end", perspective: 1600 }}>
            <div style={{
              transform: inCycle ? `rotateX(${rotX}deg)` : `translateY(${userY}px)`,
              transformOrigin: "center",
              opacity: inCycle ? cycleOpacity : userOp,
              transformStyle: "preserve-3d",
            }}>
              <div style={{
                background: "rgba(255,255,255,0.07)",
                border: "1px solid rgba(255,255,255,0.06)",
                padding: "16px 22px", borderRadius: 22, fontSize: 30, color: "var(--fg)",
                maxWidth: 760,
              }}>
                {activeQ}
              </div>
            </div>
          </div>

          {/* Paula reply: green P mark + typing dots → streamed text → static swaps */}
          {(avatarOp > 0) && (
            <div style={{ display: "grid", gridTemplateColumns: "56px 1fr", gap: 20, alignItems: "flex-start" }}>
              <span className="brand-mark" style={{
                width: 48, height: 48, borderRadius: 13, fontSize: 22,
                opacity: avatarOp,
                boxShadow: "0 0 22px rgba(16,185,129,0.4)",
              }}>P</span>
              <div style={{
                fontSize: 30, lineHeight: 1.5, color: "var(--fg)",
                fontWeight: 400, letterSpacing: "-0.005em",
                minHeight: 48,
              }}>
                {!replyStarted ? (
                  <div style={{ display: "inline-flex", gap: 8, padding: "12px 0", opacity: typingOp }}>
                    {[0, 1, 2].map((i) => (
                      <span key={i} style={{
                        width: 10, height: 10, borderRadius: 999,
                        background: "var(--muted)",
                        opacity: 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * 5 + i * 0.7)),
                      }} />
                    ))}
                  </div>
                ) : (
                  <>
                    {activeA}
                    {!inCycle && showCaret && (
                      <span style={{
                        display: "inline-block", width: 10, height: "1.05em",
                        background: "var(--fg)", verticalAlign: "-2px", marginLeft: 3,
                      }} />
                    )}
                  </>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Scene 2: "your AI trading assistant — introducing Paula" ──
  function Scene2() {
    const { time } = useTimeline();
    const op  = animate({ from: 0, to: 1, start: 10.7, end: 11.3, ease: Easing.easeOutCubic })(time)
              * (1 - animate({ from: 0, to: 1, start: 14.6, end: 15.2 })(time));

    const words = ["your", "AI", "trading", "assistant."];
    const startEach = 11.1;
    const stepEach = 0.28;

    const introOp = animate({ from: 0, to: 1, start: 12.5, end: 13.2, ease: Easing.easeOutCubic })(time);
    const introY  = animate({ from: 20, to: 0, start: 12.5, end: 13.2, ease: Easing.easeOutCubic })(time);
    const paulaOp = animate({ from: 0, to: 1, start: 13.0, end: 13.8, ease: Easing.easeOutCubic })(time);
    const paulaY  = animate({ from: 24, to: 0, start: 13.0, end: 13.8, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center", maxWidth: 1500, padding: "0 60px" }}>
          <div style={{
            fontSize: 84, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1.1,
            display: "flex", flexWrap: "wrap", gap: "0.3em", justifyContent: "center",
            color: "var(--muted)",
          }}>
            {words.map((w, i) => {
              const wOp = animate({ from: 0, to: 1, start: startEach + i * stepEach, end: startEach + i * stepEach + 0.45, ease: Easing.easeOutCubic })(time);
              const wY  = animate({ from: 18, to: 0, start: startEach + i * stepEach, end: startEach + i * stepEach + 0.45, ease: Easing.easeOutCubic })(time);
              return (
                <span key={i} style={{
                  opacity: wOp, transform: `translateY(${wY}px)`, display: "inline-block",
                }}>{w}</span>
              );
            })}
          </div>

          <div style={{ marginTop: 56, display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
            <div className="mono" style={{
              fontSize: 14, letterSpacing: "0.32em", textTransform: "uppercase",
              color: "var(--muted)", opacity: introOp, transform: `translateY(${introY}px)`,
            }}>
              · introducing ·
            </div>
            <div style={{
              fontSize: 156, fontWeight: 600, letterSpacing: "-0.05em", lineHeight: 1,
              color: "var(--accent)",
              opacity: paulaOp, transform: `translateY(${paulaY}px)`,
              textShadow: "0 0 80px rgba(16,185,129,0.35)",
            }}>
              Paula
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 3: outro — "Hey Paula. for everything trading." ──
  function Scene3() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 15.2, end: 15.8, ease: Easing.easeOutCubic })(time);
    const markScale = animate({ from: 0.82, to: 1, start: 15.2, end: 16.0, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.025 * Math.sin((time - 15.2) * 3.0);

    const heyOp   = animate({ from: 0, to: 1, start: 15.7, end: 16.3, ease: Easing.easeOutCubic })(time);
    const heyY    = animate({ from: 16, to: 0, start: 15.7, end: 16.3, ease: Easing.easeOutCubic })(time);
    const paulaOp = animate({ from: 0, to: 1, start: 16.1, end: 16.7, ease: Easing.easeOutCubic })(time);
    const paulaY  = animate({ from: 16, to: 0, start: 16.1, end: 16.7, ease: Easing.easeOutCubic })(time);

    const tagOp = animate({ from: 0, to: 1, start: 16.8, end: 17.5, ease: Easing.easeOutCubic })(time);
    const tagY  = animate({ from: 12, to: 0, start: 16.8, end: 17.5, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 28 }}>
          {/* Logo */}
          <span className="brand-mark" style={{
            width: 124, height: 124, borderRadius: 28, fontSize: 56,
            transform: `scale(${markScale * pulse})`,
            boxShadow: "0 0 70px rgba(16,185,129,0.45)",
          }}>P</span>

          {/* "Hey Paula." headline */}
          <div style={{
            fontSize: 124, fontWeight: 600, letterSpacing: "-0.04em", lineHeight: 1,
            display: "flex", gap: 28,
          }}>
            <span style={{ opacity: heyOp, transform: `translateY(${heyY}px)` }}>Hey</span>
            <span style={{
              opacity: paulaOp, transform: `translateY(${paulaY}px)`, color: "var(--accent)",
            }}>Paula.</span>
          </div>

          {/* Tagline */}
          <div style={{
            fontSize: 30, color: "var(--muted)", letterSpacing: "-0.01em",
            opacity: tagOp, transform: `translateY(${tagY}px)`,
            textAlign: "center", maxWidth: 900,
          }}>
            for <span style={{ color: "var(--fg)" }}>everything</span> trading.
          </div>
        </div>
      </div>
    );
  }

  function FilmGrain() {
    const { time } = useTimeline();
    const seed = Math.floor(time * 8) % 100;
    return (
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.05, mixBlendMode: "overlay", pointerEvents: "none" }}>
        <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed={seed} /></filter>
        <rect width="100%" height="100%" filter="url(#g)" />
      </svg>
    );
  }

  function Vignette() {
    return (
      <div style={{
        position: "absolute", inset: 0, pointerEvents: "none",
        background: "radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.65) 100%)",
      }} />
    );
  }

  function Commercial() {
    return (
      <>
        <Bg />
        <Scene1a />
        <Scene1b />
        <Scene2 />
        <Scene3 />
        <Vignette />
        <FilmGrain />
      </>
    );
  }

  function Root() {
    return (
      <Stage width={1920} height={1080} duration={DUR} background="#000">
        <Commercial />
      </Stage>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
