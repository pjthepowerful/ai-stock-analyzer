<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paula — the trailer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#08080c; --bg2:#101018; --card:#14141d; --brd:rgba(255,255,255,0.07);
      --fg:#f0f0f6; --lt:#c4c4d2; --dim:#5a5a72;
      --grn:#10b981; --grn2:#34d399; --grn3:#6ee7b7; --red:#ef4444; --accent:#34d399;
    }
    * { box-sizing: border-box; margin: 0 }
    html, body, #root { height: 100% }
    body { background: #000; color: var(--fg); font: 16px/1.5 "DM Sans", system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden }
    .mono { font-family: "JetBrains Mono", monospace }
    .mark {
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(150deg, var(--grn2), var(--grn));
      border-radius: 24%; font-family: "JetBrains Mono", monospace; font-weight: 800; color: #04130d;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel">

  const DUR = 26;

  // helper: fade a scene in over [a,b], hold, fade out over [c,d]
  const sceneOpacity = (time, a, b, c, d) =>
    animate({ from: 0, to: 1, start: a, end: b, ease: Easing.easeOutCubic })(time) *
    (1 - animate({ from: 0, to: 1, start: c, end: d, ease: Easing.easeInCubic })(time));

  // ── Ambient background: drifting green glow + faint grid ──
  function Bg() {
    const { time } = useTimeline();
    const x = 50 + Math.sin(time * 0.18) * 16;
    const y = 46 + Math.cos(time * 0.13) * 12;
    const glow = 0.10 + 0.06 * (0.5 + 0.5 * Math.sin(time * 0.4));
    return (
      <div style={{ position: "absolute", inset: 0, background: "var(--bg)" }}>
        <div style={{ position: "absolute", inset: 0,
          background: `radial-gradient(680px 460px at ${x}% ${y}%, rgba(16,185,129,${glow}) 0%, transparent 62%)` }} />
        <div style={{ position: "absolute", inset: 0, opacity: 0.04,
          backgroundImage: "linear-gradient(rgba(255,255,255,0.4) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.4) 1px, transparent 1px)",
          backgroundSize: "64px 64px",
          maskImage: "radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 75%)",
          WebkitMaskImage: "radial-gradient(ellipse 70% 70% at 50% 50%, #000 30%, transparent 75%)" }} />
      </div>
    );
  }

  // ── Live ticker tape drifting across the very top ──
  function Tape() {
    const { time } = useTimeline();
    const op = sceneOpacity(time, 0, 1.2, 24.5, 26) * 0.5;
    const items = [["NVDA","+1.8%",1],["AAPL","+0.4%",1],["TSLA","-1.2%",0],["XOM","+0.9%",1],
      ["AMD","+2.1%",1],["MSFT","+0.7%",1],["META","+1.1%",1],["SPY","-0.3%",0],["AVGO","+1.4%",1],["GOOGL","+0.6%",1]];
    const shift = (time * 60) % 1000;
    return (
      <div style={{ position: "absolute", top: 26, left: 0, right: 0, height: 22, overflow: "hidden", opacity: op }}>
        <div className="mono" style={{ position: "absolute", whiteSpace: "nowrap", left: -shift, fontSize: 13, letterSpacing: "0.04em" }}>
          {[...items, ...items, ...items].map((it, i) => (
            <span key={i} style={{ marginRight: 34, color: "var(--dim)" }}>
              {it[0]} <span style={{ color: it[2] ? "var(--grn2)" : "var(--red)" }}>{it[1]}</span>
            </span>
          ))}
        </div>
      </div>
    );
  }

  // ── SCENE 1 (0–3.6): "Paula." cold open ──
  function Scene1() {
    const { time } = useTimeline();
    const op = sceneOpacity(time, 0.2, 0.8, 3.0, 3.6);
    const mS  = animate({ from: 0.5, to: 1, start: 0.2, end: 1.0, ease: Easing.easeOutBack })(time);
    const pOp = animate({ from: 0, to: 1, start: 0.5, end: 1.2, ease: Easing.easeOutCubic })(time);
    const pY  = animate({ from: 26, to: 0, start: 0.5, end: 1.3, ease: Easing.easeOutCubic })(time);
    const sOp = animate({ from: 0, to: 1, start: 1.6, end: 2.2, ease: Easing.easeOutCubic })(time);
    const line = animate({ from: 0, to: 1, start: 1.5, end: 2.3, ease: Easing.easeOutCubic })(time);
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center" }}>
          <span className="mark" style={{ width: 96, height: 96, borderRadius: 26, fontSize: 46, transform: `scale(${mS})`, boxShadow: "0 0 50px rgba(16,185,129,0.4)", marginBottom: 28 }}>P</span>
          <div style={{ fontSize: 120, fontWeight: 800, letterSpacing: "-0.05em", lineHeight: 1, opacity: pOp, transform: `translateY(${pY}px)`, background: "linear-gradient(120deg,var(--grn3),var(--grn))", WebkitBackgroundClip: "text", backgroundClip: "text", WebkitTextFillColor: "transparent" }}>Paula</div>
          <div style={{ height: 2, width: 220 * line, background: "linear-gradient(90deg,transparent,var(--grn),transparent)", margin: "26px auto 0" }} />
          <div style={{ fontSize: 22, color: "var(--dim)", marginTop: 20, opacity: sOp, letterSpacing: "0.05em" }}>
            Hey Paula — for everything trading
          </div>
        </div>
      </div>
    );
  }

  // ── SCENE 2 (3.6–6.4): the promise ──
  function Scene2() {
    const { time } = useTimeline();
    const op = sceneOpacity(time, 3.6, 4.2, 5.8, 6.4);
    const lines = [
      { t: "The market never stops.", s: 3.8, big: true },
      { t: "So now you don\u2019t have to watch it.", s: 4.7, big: false },
    ];
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center", maxWidth: 900 }}>
          {lines.map((l, i) => {
            const o = animate({ from: 0, to: 1, start: l.s, end: l.s + 0.55, ease: Easing.easeOutCubic })(time);
            const y = animate({ from: 16, to: 0, start: l.s, end: l.s + 0.55, ease: Easing.easeOutCubic })(time);
            return <div key={i} style={{ fontSize: l.big ? 58 : 38, fontWeight: l.big ? 700 : 400,
              color: l.big ? "var(--fg)" : "var(--dim)", opacity: o, transform: `translateY(${y}px)`, marginBottom: 14, letterSpacing: "-0.02em" }}>{l.t}</div>;
          })}
        </div>
      </div>
    );
  }

  // ── SCENE 3 (6.4–13): live chat demo ──
  function Scene3() {
    const { time } = useTimeline();
    const op = sceneOpacity(time, 6.4, 7.0, 12.3, 13.0);
    const boxY = animate({ from: 22, to: 0, start: 6.4, end: 7.1, ease: Easing.easeOutCubic })(time);
    const ex = [
      { q: "Scan the market for swing setups.", a: "Scanned 1,000+ stocks. Top pick: XOM \u2014 pullback to the 20-day in an uptrend. Score 84 \u00b7 BUY.", s: 7.1 },
      { q: "Why that one?", a: "Near its 52-week high, volatility coiling, volume confirming. Stop 3% below, target 2:1.", s: 9.0 },
      { q: "Any news I should know?", a: "Live headlines \u2014 earnings beat last week, an analyst upgrade this morning. Catalyst is intact.", s: 10.7 },
    ];
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ width: 860, maxWidth: "88%", background: "var(--card)", border: "1px solid var(--brd)", borderRadius: 22,
          padding: "26px 28px", boxShadow: "0 30px 80px rgba(0,0,0,0.5)", display: "flex", flexDirection: "column", gap: 18, transform: `translateY(${boxY}px)` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 2 }}>
            <span className="mark" style={{ width: 26, height: 26, borderRadius: 7, fontSize: 13 }}>P</span>
            <span style={{ fontSize: 14, color: "var(--dim)", letterSpacing: "0.04em" }}>Paula</span>
            <span style={{ marginLeft: "auto", width: 8, height: 8, borderRadius: "50%", background: "var(--grn)", boxShadow: "0 0 10px var(--grn)" }} />
          </div>
          {ex.map((e, i) => {
            const o = animate({ from: 0, to: 1, start: e.s, end: e.s + 0.35, ease: Easing.easeOutCubic })(time);
            const y = animate({ from: 12, to: 0, start: e.s, end: e.s + 0.4, ease: Easing.easeOutCubic })(time);
            if (o <= 0) return null;
            const ss = e.s + 0.55;
            const prog = animate({ from: 0, to: 1, start: ss, end: ss + 0.8 })(time);
            const shown = e.a.slice(0, Math.floor(prog * e.a.length));
            const caret = time > ss && prog < 1 && Math.sin(time * 4) > 0;
            const showReply = time > ss - 0.1;
            return (
              <div key={i} style={{ opacity: o, transform: `translateY(${y}px)`, display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ alignSelf: "flex-end", maxWidth: "78%" }}>
                  <span style={{ display: "inline-block", background: "linear-gradient(135deg,var(--grn),var(--grn2))", color: "#04130d", padding: "10px 16px", borderRadius: "16px 16px 4px 16px", fontSize: 18, fontWeight: 500 }}>{e.q}</span>
                </div>
                {showReply && (
                  <div style={{ display: "flex", gap: 12, alignItems: "flex-start", maxWidth: "88%" }}>
                    <span className="mark" style={{ width: 28, height: 28, borderRadius: 8, fontSize: 13, flexShrink: 0, marginTop: 2 }}>P</span>
                    <span style={{ fontSize: 18, color: "var(--lt)", lineHeight: 1.55, background: "var(--bg2)", border: "1px solid var(--brd)", padding: "10px 15px", borderRadius: "4px 16px 16px 16px" }}>
                      {shown}{caret && <span style={{ display: "inline-block", width: 2, height: "1em", background: "var(--grn)", marginLeft: 2, verticalAlign: "middle" }} />}
                    </span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── SCENE 4 (13–16.4): what it does ──
  function Scene4() {
    const { time } = useTimeline();
    const op = sceneOpacity(time, 13.0, 13.6, 15.8, 16.4);
    const hOp = animate({ from: 0, to: 1, start: 13.1, end: 13.7 })(time);
    const feats = [
      { t: "Scans 1,000+ stocks in seconds", s: 13.5 },
      { t: "Autopilot trades the swing for you", s: 13.9 },
      { t: "Reads the news as it breaks", s: 14.3 },
      { t: "Names the entry, stop & target", s: 14.7 },
    ];
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ width: 720, maxWidth: "88%" }}>
          <div style={{ fontSize: 50, fontWeight: 800, textAlign: "center", marginBottom: 36, opacity: hOp, letterSpacing: "-0.03em" }}>
            It does the <span style={{ color: "var(--grn2)" }}>work.</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {feats.map((f, i) => {
              const o = animate({ from: 0, to: 1, start: f.s, end: f.s + 0.4, ease: Easing.easeOutCubic })(time);
              const y = animate({ from: 16, to: 0, start: f.s, end: f.s + 0.45, ease: Easing.easeOutBack })(time);
              return (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 14, background: "var(--card)", border: "1px solid var(--brd)", borderRadius: 14, padding: "18px 20px", opacity: o, transform: `translateY(${y}px)` }}>
                  <span style={{ width: 9, height: 9, borderRadius: "50%", background: "var(--grn)", flexShrink: 0, boxShadow: "0 0 10px rgba(16,185,129,0.6)" }} />
                  <span style={{ fontSize: 18, fontWeight: 500 }}>{f.t}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── SCENE 5 (16.4–19.6): the turn ──
  function Scene5() {
    const { time } = useTimeline();
    const op = sceneOpacity(time, 16.4, 17.0, 19.0, 19.6);
    const o1 = animate({ from: 0, to: 1, start: 16.6, end: 17.2, ease: Easing.easeOutCubic })(time);
    const y1 = animate({ from: 18, to: 0, start: 16.6, end: 17.2, ease: Easing.easeOutCubic })(time);
    const o2 = animate({ from: 0, to: 1, start: 17.4, end: 18.0, ease: Easing.easeOutCubic })(time);
    const y2 = animate({ from: 18, to: 0, start: 17.4, end: 18.0, ease: Easing.easeOutCubic })(time);
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 70, fontWeight: 300, color: "var(--dim)", opacity: o1, transform: `translateY(${y1}px)`, letterSpacing: "-0.03em" }}>You live your life.</div>
          <div style={{ fontSize: 34, color: "var(--grn2)", marginTop: 18, opacity: o2, transform: `translateY(${y2}px)`, fontWeight: 600 }}>Paula watches the market.</div>
        </div>
      </div>
    );
  }

  // ── SCENE 6 (19.6–26): outro ──
  function Scene6() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 19.6, end: 20.2, ease: Easing.easeOutCubic })(time);
    const mS = animate({ from: 0.6, to: 1, start: 19.6, end: 20.5, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.03 * Math.sin((time - 19.6) * 2.4);
    const hOp = animate({ from: 0, to: 1, start: 20.1, end: 20.7 })(time);
    const hY = animate({ from: 14, to: 0, start: 20.1, end: 20.7, ease: Easing.easeOutCubic })(time);
    const pOp = animate({ from: 0, to: 1, start: 20.4, end: 21.0 })(time);
    const pY = animate({ from: 14, to: 0, start: 20.4, end: 21.0, ease: Easing.easeOutCubic })(time);
    const tOp = animate({ from: 0, to: 1, start: 21.2, end: 21.9 })(time);
    const uOp = animate({ from: 0, to: 1, start: 21.8, end: 22.5 })(time);
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 22 }}>
          <span className="mark" style={{ width: 92, height: 92, borderRadius: 24, fontSize: 42, transform: `scale(${mS * pulse})`, boxShadow: "0 0 50px rgba(16,185,129,0.4)" }}>P</span>
          <div style={{ fontSize: 96, fontWeight: 800, letterSpacing: "-0.05em", lineHeight: 1, opacity: pOp, transform: `translateY(${pY}px)`, background: "linear-gradient(120deg,var(--grn3),var(--grn))", WebkitBackgroundClip: "text", backgroundClip: "text", WebkitTextFillColor: "transparent" }}>Paula</div>
          <div style={{ fontSize: 22, color: "var(--dim)", opacity: tOp }}>
            your <span style={{ color: "var(--fg)" }}>AI trading</span> assistant
          </div>
          <div className="mono" style={{ fontSize: 13, color: "var(--grn2)", letterSpacing: "0.12em", opacity: uOp, marginTop: 6, border: "1px solid var(--brd)", borderRadius: 999, padding: "7px 18px" }}>
            ai-stock-analyzer-six.vercel.app
          </div>
        </div>
      </div>
    );
  }

  function Vignette() { return <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,0.55) 100%)" }} /> }
  function Grain() {
    const { time } = useTimeline();
    return (
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.035, mixBlendMode: "overlay", pointerEvents: "none" }}>
        <filter id="gr"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed={Math.floor(time * 8) % 100} /></filter>
        <rect width="100%" height="100%" filter="url(#gr)" />
      </svg>
    );
  }

  function Commercial() {
    return <><Bg/><Tape/><Scene1/><Scene2/><Scene3/><Scene4/><Scene5/><Scene6/><Vignette/><Grain/></>;
  }
  function Root() { return <Stage width={1920} height={1080} duration={DUR} background="#000"><Commercial/></Stage>; }
  ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
