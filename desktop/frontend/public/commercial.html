<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hey Paula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050507;
      --bg2: #0c0c12;
      --fg: #eaeaf2;
      --dim: #7a7a96;
      --grn: #10b981;
      --grn2: #34d399;
      --dark: #050507;
      --red: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #000; color: var(--fg);
      font: 16px/1.5 "Outfit", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .mono { font-family: "JetBrains Mono", monospace; }
    .mark {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--grn); border-radius: 22%;
      font-family: "JetBrains Mono", monospace; font-weight: 800;
      color: var(--dark);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel">

  const DUR = 20;

  const CHATS = [
    { q: "Hey Paula, what's the play today?", a: "Tech leading. SPY above VWAP — let winners run." },
    { q: "Find me a breakout",               a: "AMD setting up. R/R 2.6×, score 78." },
    { q: "Can I hold NVDA?",                 a: "Yes — trail your stop below the 20-EMA." },
    { q: "Recap my week",                    a: "+$1,284. 64% win rate. NVDA carried." },
    { q: "Size this trade",                  a: "Risk 1% — 45 shares, 3× ATR stop." },
    { q: "Hedge my book",                    a: "Cut tech 20%. Concentration at 68%." },
  ];

  const STATS = [
    { n: "21", label: "signal factors" },
    { n: "5min", label: "scan cycles" },
    { n: "100+", label: "stocks tracked" },
    { n: "24/7", label: "autopilot" },
  ];

  // ── Background ──
  function Bg() {
    const { time } = useTimeline();
    const d = Math.sin(time * 0.25) * 35;
    return <div style={{
      position: "absolute", inset: 0,
      background:
        `radial-gradient(800px 500px at ${55+d/5}% ${35-d/8}%, rgba(16,185,129,0.15) 0%, transparent 55%),` +
        `radial-gradient(600px 400px at ${35-d/6}% ${80+d/10}%, rgba(16,185,129,0.07) 0%, transparent 55%),` +
        "var(--bg)",
    }} />;
  }

  // ── Scene 1: fast logo (0 – 1.5) ──
  function SceneLogo() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 0.1, end: 0.4 })(time)
             * (1 - animate({ from: 0, to: 1, start: 1.2, end: 1.5 })(time));
    const s = animate({ from: 0.5, to: 1, start: 0.1, end: 0.6, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.04 * Math.sin(time * 4);
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 24 }}>
          <span className="mark" style={{
            width: 120, height: 120, borderRadius: 28, fontSize: 54,
            transform: `scale(${s * pulse})`,
            boxShadow: "0 0 60px rgba(16,185,129,0.4)",
          }}>P</span>
          <div style={{
            fontSize: 72, fontWeight: 700, letterSpacing: "-0.04em",
            opacity: animate({ from: 0, to: 1, start: 0.4, end: 0.8 })(time),
            transform: `translateY(${animate({ from: 14, to: 0, start: 0.4, end: 0.8, ease: Easing.easeOutCubic })(time)}px)`,
          }}>Paula</div>
        </div>
      </div>
    );
  }

  // ── Scene 2: chat demo with typing (1.5 – 5.5) ──
  function SceneChat() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 1.5, end: 2.0, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 5.0, end: 5.5 })(time));
    const boxY = animate({ from: 24, to: 0, start: 1.5, end: 2.1, ease: Easing.easeOutCubic })(time);

    // User bubble
    const uOp = animate({ from: 0, to: 1, start: 1.8, end: 2.3, ease: Easing.easeOutCubic })(time);
    const uY = animate({ from: 12, to: 0, start: 1.8, end: 2.3, ease: Easing.easeOutCubic })(time);

    // Avatar + dots
    const avOp = animate({ from: 0, to: 1, start: 2.6, end: 2.9 })(time);
    const dotsOp = animate({ from: 0, to: 1, start: 2.7, end: 2.9 })(time)
                 * (1 - animate({ from: 0, to: 1, start: 3.2, end: 3.4 })(time));

    // Stream reply
    const reply = CHATS[0].a;
    const stream = animate({ from: 0, to: 1, start: 3.4, end: 4.4, ease: Easing.linear })(time);
    const shown = reply.slice(0, Math.floor(stream * reply.length));
    const caret = time > 3.4 && stream < 1 && Math.floor(time * 2.5) % 2 === 0;

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{
          width: 900, maxWidth: "88%", background: "var(--bg2)",
          border: "1px solid rgba(255,255,255,0.07)", borderRadius: 20,
          padding: "28px 32px", boxShadow: "0 30px 80px rgba(0,0,0,0.5)",
          display: "flex", flexDirection: "column", gap: 24,
          transform: `translateY(${boxY}px)`,
        }}>
          <div style={{ alignSelf: "flex-end", opacity: uOp, transform: `translateY(${uY}px)` }}>
            <div style={{
              background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.05)",
              padding: "12px 18px", borderRadius: 16, fontSize: 24, color: "var(--fg)",
            }}>{CHATS[0].q}</div>
          </div>
          {avOp > 0 && (
            <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
              <span className="mark" style={{
                width: 38, height: 38, borderRadius: 10, fontSize: 16, flexShrink: 0,
                opacity: avOp, boxShadow: "0 0 16px rgba(16,185,129,0.25)",
              }}>P</span>
              <div style={{ fontSize: 24, lineHeight: 1.55, color: "var(--fg)", minHeight: 38 }}>
                {time < 3.4 ? (
                  <div style={{ display: "flex", gap: 6, padding: "8px 0", opacity: dotsOp }}>
                    {[0,1,2].map(i => <span key={i} style={{ width: 7, height: 7, borderRadius: 99, background: "var(--dim)", opacity: 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 5.5 + i * 0.8)) }} />)}
                  </div>
                ) : <>{shown}{caret && <span style={{ display: "inline-block", width: 2, height: "1em", background: "var(--grn)", marginLeft: 2, verticalAlign: "-1px" }} />}</>}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Scene 3: stats burst (5.5 – 8.0) ──
  function SceneStats() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 5.5, end: 6.0, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 7.5, end: 8.0 })(time));
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 36, maxWidth: 800 }}>
          {STATS.map((s, i) => {
            const d = i * 0.22;
            const sOp = animate({ from: 0, to: 1, start: 5.7 + d, end: 6.2 + d, ease: Easing.easeOutCubic })(time);
            const sY = animate({ from: 35, to: 0, start: 5.7 + d, end: 6.2 + d, ease: Easing.easeOutBack })(time);
            return (
              <div key={i} style={{ textAlign: "center", opacity: sOp, transform: `translateY(${sY}px)` }}>
                <div className="mono" style={{ fontSize: 80, fontWeight: 700, lineHeight: 1, color: "var(--grn)", textShadow: "0 0 50px rgba(16,185,129,0.3)" }}>{s.n}</div>
                <div style={{ fontSize: 18, color: "var(--dim)", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: 6 }}>{s.label}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Scene 4: "fully automated AI trading" (8.0 – 9.8) ──
  function SceneTagline() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 8.0, end: 8.5, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 9.3, end: 9.8 })(time));
    const words = ["fully", "automated", "AI", "trading."];
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ fontSize: 76, fontWeight: 700, letterSpacing: "-0.04em", display: "flex", gap: "0.25em", justifyContent: "center", flexWrap: "wrap" }}>
          {words.map((w, i) => {
            const wOp = animate({ from: 0, to: 1, start: 8.2 + i * 0.18, end: 8.2 + i * 0.18 + 0.3, ease: Easing.easeOutCubic })(time);
            const wY = animate({ from: 20, to: 0, start: 8.2 + i * 0.18, end: 8.2 + i * 0.18 + 0.3, ease: Easing.easeOutCubic })(time);
            const accent = w === "AI";
            return <span key={i} style={{
              opacity: wOp, transform: `translateY(${wY}px)`, display: "inline-block",
              color: accent ? "var(--grn)" : "var(--fg)",
              textShadow: accent ? "0 0 40px rgba(16,185,129,0.4)" : "none",
            }}>{w}</span>;
          })}
        </div>
      </div>
    );
  }

  // ── Scene 5: chat feed — messages stack up like a real chat (9.8 – 14.5) ──
  function SceneFeed() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 9.8, end: 10.3, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 14.0, end: 14.5 })(time));

    // Each exchange appears at staggered times
    const msgs = [];
    const START = 10.0;
    const GAP = 0.7; // time between each Q&A pair
    for (let i = 0; i < CHATS.length; i++) {
      const t = START + i * GAP;
      const msgOp = animate({ from: 0, to: 1, start: t, end: t + 0.25, ease: Easing.easeOutCubic })(time);
      const msgY = animate({ from: 20, to: 0, start: t, end: t + 0.3, ease: Easing.easeOutCubic })(time);
      if (msgOp > 0) {
        msgs.push({ ...CHATS[i], op: msgOp, y: msgY, idx: i });
      }
    }

    // Scroll the feed up as more messages appear
    const feedScroll = animate({ from: 0, to: -180, start: 11.0, end: 13.5, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op, overflow: "hidden" }}>
        <div style={{
          width: 800, maxWidth: "85%",
          transform: `translateY(${feedScroll}px)`,
          display: "flex", flexDirection: "column", gap: 14,
        }}>
          {msgs.map(m => (
            <div key={m.idx} style={{ opacity: m.op, transform: `translateY(${m.y}px)`, display: "flex", flexDirection: "column", gap: 8 }}>
              {/* User */}
              <div style={{ alignSelf: "flex-end" }}>
                <span style={{
                  display: "inline-block", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.04)",
                  padding: "8px 16px", borderRadius: 14, fontSize: 18, color: "var(--fg)",
                }}>{m.q}</span>
              </div>
              {/* Paula */}
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span className="mark" style={{ width: 26, height: 26, borderRadius: 7, fontSize: 11, flexShrink: 0 }}>P</span>
                <span style={{ fontSize: 18, color: "var(--dim)", lineHeight: 1.5 }}>{m.a}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── Scene 6: outro — "Hey Paula." (14.5 – 20) ──
  function SceneOutro() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 14.5, end: 15.1, ease: Easing.easeOutCubic })(time);
    const markS = animate({ from: 0.75, to: 1, start: 14.5, end: 15.3, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.025 * Math.sin((time - 14.5) * 3);

    const heyOp = animate({ from: 0, to: 1, start: 15.0, end: 15.5, ease: Easing.easeOutCubic })(time);
    const heyY = animate({ from: 14, to: 0, start: 15.0, end: 15.5, ease: Easing.easeOutCubic })(time);
    const pOp = animate({ from: 0, to: 1, start: 15.3, end: 15.8, ease: Easing.easeOutCubic })(time);
    const pY = animate({ from: 14, to: 0, start: 15.3, end: 15.8, ease: Easing.easeOutCubic })(time);
    const tagOp = animate({ from: 0, to: 1, start: 16.0, end: 16.6, ease: Easing.easeOutCubic })(time);
    const tagY = animate({ from: 10, to: 0, start: 16.0, end: 16.6, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 24 }}>
          <span className="mark" style={{
            width: 100, height: 100, borderRadius: 24, fontSize: 46,
            transform: `scale(${markS * pulse})`,
            boxShadow: "0 0 60px rgba(16,185,129,0.4)",
          }}>P</span>
          <div style={{ fontSize: 100, fontWeight: 700, letterSpacing: "-0.04em", lineHeight: 1, display: "flex", gap: 22 }}>
            <span style={{ opacity: heyOp, transform: `translateY(${heyY}px)` }}>Hey</span>
            <span style={{ opacity: pOp, transform: `translateY(${pY}px)`, color: "var(--grn)" }}>Paula.</span>
          </div>
          <div style={{
            fontSize: 26, color: "var(--dim)", letterSpacing: "-0.01em",
            opacity: tagOp, transform: `translateY(${tagY}px)`,
          }}>for <span style={{ color: "var(--fg)" }}>everything</span> trading.</div>
        </div>
      </div>
    );
  }

  function Grain() {
    const { time } = useTimeline();
    return <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.04, mixBlendMode: "overlay", pointerEvents: "none" }}>
      <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed={Math.floor(time * 8) % 100} /></filter>
      <rect width="100%" height="100%" filter="url(#g)" />
    </svg>;
  }

  function Vignette() {
    return <div style={{ position: "absolute", inset: 0, pointerEvents: "none", background: "radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.6) 100%)" }} />;
  }

  function Commercial() {
    return <>
      <Bg />
      <SceneLogo />
      <SceneChat />
      <SceneStats />
      <SceneTagline />
      <SceneFeed />
      <SceneOutro />
      <Vignette />
      <Grain />
    </>;
  }

  function Root() {
    return <Stage width={1920} height={1080} duration={DUR} background="#000"><Commercial /></Stage>;
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
