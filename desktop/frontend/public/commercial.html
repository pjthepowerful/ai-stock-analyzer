<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hey Paula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#050507; --bg2:#0c0c12; --fg:#eaeaf2; --dim:#555570; --grn:#10b981; --grn2:#34d399 }
    * { box-sizing: border-box; margin: 0 }
    html, body, #root { height: 100% }
    body { background: #000; color: var(--fg); font: 16px/1.5 "Outfit", system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden }
    .mono { font-family: "JetBrains Mono", monospace }
    .mark { display: inline-flex; align-items: center; justify-content: center; background: var(--grn); border-radius: 22%; font-family: "JetBrains Mono", monospace; font-weight: 800; color: var(--bg) }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel">

  const DUR = 24;

  // ── Background ──
  function Bg() {
    const { time } = useTimeline();
    const d = Math.sin(time * 0.15) * 25;
    const glow = time < 4 ? 0.18 : time < 10 ? 0.12 : time > 18 ? 0.2 : 0.1;
    return <div style={{ position: "absolute", inset: 0, background: `radial-gradient(600px 400px at ${50+d/4}% ${45-d/5}%, rgba(16,185,129,${glow}) 0%, transparent 60%), var(--bg)`, transition: "background 1s" }} />;
  }

  // ── Scene 1: "Hey Paula." — hooks instantly (0 – 3.5) ──
  function Scene1() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 0.2, end: 0.7, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 2.8, end: 3.5, ease: Easing.easeInCubic })(time));
    const hY = animate({ from: 18, to: 0, start: 0.2, end: 0.8, ease: Easing.easeOutCubic })(time);
    const pY = animate({ from: 18, to: 0, start: 0.5, end: 1.1, ease: Easing.easeOutCubic })(time);
    const hOp = animate({ from: 0, to: 1, start: 0.2, end: 0.8, ease: Easing.easeOutCubic })(time);
    const pOp = animate({ from: 0, to: 1, start: 0.5, end: 1.1, ease: Easing.easeOutCubic })(time);
    const subOp = animate({ from: 0, to: 1, start: 1.4, end: 2.0, ease: Easing.easeOutCubic })(time);
    const subY = animate({ from: 10, to: 0, start: 1.4, end: 2.0, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 110, fontWeight: 700, letterSpacing: "-0.04em", lineHeight: 1, display: "flex", gap: 18, justifyContent: "center" }}>
            <span style={{ opacity: hOp, transform: `translateY(${hY}px)` }}>Hey</span>
            <span style={{ opacity: pOp, transform: `translateY(${pY}px)`, color: "var(--grn)" }}>Paula.</span>
          </div>
          <div style={{ fontSize: 20, color: "var(--dim)", marginTop: 20, opacity: subOp, transform: `translateY(${subY}px)`, letterSpacing: "0.04em" }}>
            your AI swing-trading copilot
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 2: "What if you could just...ask?" (3.5 – 6.5) ──
  function Scene2() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 3.5, end: 4.1, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 5.8, end: 6.5, ease: Easing.easeInCubic })(time));

    const lines = [
      { text: "What if you could just... ask?", start: 3.7 },
      { text: "And it found the setups for you.", start: 4.6 },
    ];

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center", maxWidth: 800 }}>
          {lines.map((l, i) => {
            const lOp = animate({ from: 0, to: 1, start: l.start, end: l.start + 0.5, ease: Easing.easeOutCubic })(time);
            const lY = animate({ from: 14, to: 0, start: l.start, end: l.start + 0.5, ease: Easing.easeOutCubic })(time);
            return <div key={i} style={{
              fontSize: i === 0 ? 52 : 36,
              fontWeight: i === 0 ? 600 : 400,
              color: i === 0 ? "var(--fg)" : "var(--dim)",
              opacity: lOp, transform: `translateY(${lY}px)`,
              marginBottom: 12,
            }}>{l.text}</div>;
          })}
        </div>
      </div>
    );
  }

  // ── Scene 3: chat demo — simple questions (6.5 – 12) ──
  function Scene3() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 6.5, end: 7.0, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 11.3, end: 12.0, ease: Easing.easeInCubic })(time));
    const boxY = animate({ from: 18, to: 0, start: 6.5, end: 7.0, ease: Easing.easeOutCubic })(time);

    const exchanges = [
      { q: "Hey Paula, find me some swing setups.", a: "XOM — pullback to 20 SMA in an uptrend. Score 84, BUY.", start: 7.0 },
      { q: "Why this one?", a: "Near its 52-week high, volatility coiling, strong volume. Stop 3% below, target 2:1.", start: 8.5 },
      { q: "What's the latest news on it?", a: "Pulling live headlines — earnings beat last week, analyst upgrade this morning.", start: 10.0 },
    ];

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{
          width: 780, maxWidth: "85%", background: "var(--bg2)",
          border: "1px solid rgba(255,255,255,0.06)", borderRadius: 18,
          padding: "20px 24px", boxShadow: "0 20px 50px rgba(0,0,0,0.35)",
          display: "flex", flexDirection: "column", gap: 16,
          transform: `translateY(${boxY}px)`,
        }}>
          {exchanges.map((ex, i) => {
            const eOp = animate({ from: 0, to: 1, start: ex.start, end: ex.start + 0.35, ease: Easing.easeOutCubic })(time);
            const eY = animate({ from: 10, to: 0, start: ex.start, end: ex.start + 0.4, ease: Easing.easeOutCubic })(time);

            // Stream the reply
            const streamStart = ex.start + 0.5;
            const stream = animate({ from: 0, to: 1, start: streamStart, end: streamStart + 0.6 })(time);
            const shown = ex.a.slice(0, Math.floor(stream * ex.a.length));
            const caret = time > streamStart && stream < 1 && Math.sin(time * 3.5) > 0;
            const replyVisible = time > streamStart - 0.1;

            if (eOp <= 0) return null;
            return (
              <div key={i} style={{ opacity: eOp, transform: `translateY(${eY}px)`, display: "flex", flexDirection: "column", gap: 8 }}>
                <div style={{ alignSelf: "flex-end" }}>
                  <span style={{ display: "inline-block", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.04)", padding: "8px 14px", borderRadius: 14, fontSize: 18, color: "var(--fg)" }}>{ex.q}</span>
                </div>
                {replyVisible && (
                  <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <span className="mark" style={{ width: 28, height: 28, borderRadius: 7, fontSize: 12, flexShrink: 0, boxShadow: "0 0 10px rgba(16,185,129,0.15)" }}>P</span>
                    <span style={{ fontSize: 18, color: "var(--dim)", lineHeight: 1.5 }}>
                      {shown}{caret && <span style={{ display: "inline-block", width: 2, height: "1em", background: "var(--grn)", marginLeft: 1 }} />}
                    </span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Scene 4: "She does the work" (12 – 15) ──
  function Scene4() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 12.0, end: 12.5, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 14.3, end: 15.0, ease: Easing.easeInCubic })(time));

    const features = [
      { icon: "🎯", text: "Names every setup", start: 12.3 },
      { icon: "🤖", text: "Autopilot holds for the swing", start: 12.7 },
      { icon: "📰", text: "Knows the latest news", start: 13.1 },
      { icon: "💬", text: "Just ask in plain English", start: 13.5 },
    ];

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ maxWidth: 600 }}>
          <div style={{
            fontSize: 44, fontWeight: 700, color: "var(--fg)", textAlign: "center", marginBottom: 36,
            opacity: animate({ from: 0, to: 1, start: 12.1, end: 12.5 })(time),
          }}>She does the work.</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            {features.map((f, i) => {
              const fOp = animate({ from: 0, to: 1, start: f.start, end: f.start + 0.35, ease: Easing.easeOutCubic })(time);
              const fY = animate({ from: 12, to: 0, start: f.start, end: f.start + 0.35, ease: Easing.easeOutBack })(time);
              return (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 12,
                  background: "var(--bg2)", border: "1px solid rgba(255,255,255,0.06)",
                  borderRadius: 12, padding: "14px 16px",
                  opacity: fOp, transform: `translateY(${fY}px)`,
                }}>
                  <span style={{ fontSize: 22 }}>{f.icon}</span>
                  <span style={{ fontSize: 17, color: "var(--fg)", fontWeight: 500 }}>{f.text}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 5: "You live yours." (15 – 18) ──
  function Scene5() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 15.0, end: 15.6, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 17.3, end: 18.0, ease: Easing.easeInCubic })(time));

    const w1Op = animate({ from: 0, to: 1, start: 15.2, end: 15.7, ease: Easing.easeOutCubic })(time);
    const w1Y = animate({ from: 16, to: 0, start: 15.2, end: 15.7, ease: Easing.easeOutCubic })(time);
    const w2Op = animate({ from: 0, to: 1, start: 15.7, end: 16.2, ease: Easing.easeOutCubic })(time);
    const w2Y = animate({ from: 16, to: 0, start: 15.7, end: 16.2, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 64, fontWeight: 300, color: "var(--dim)", opacity: w1Op, transform: `translateY(${w1Y}px)`, letterSpacing: "-0.02em" }}>
            You live yours.
          </div>
          <div style={{ fontSize: 26, color: "var(--grn2)", marginTop: 16, opacity: w2Op, transform: `translateY(${w2Y}px)` }}>
            Paula handles the markets.
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 6: outro — "Hey Paula." (18 – 24) ──
  function Scene6() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 18.0, end: 18.6, ease: Easing.easeOutCubic })(time);
    const markS = animate({ from: 0.7, to: 1, start: 18.0, end: 18.8, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.02 * Math.sin((time - 18) * 2.5);
    const hOp = animate({ from: 0, to: 1, start: 18.4, end: 18.9, ease: Easing.easeOutCubic })(time);
    const hY = animate({ from: 12, to: 0, start: 18.4, end: 18.9, ease: Easing.easeOutCubic })(time);
    const pOp = animate({ from: 0, to: 1, start: 18.7, end: 19.2, ease: Easing.easeOutCubic })(time);
    const pY = animate({ from: 12, to: 0, start: 18.7, end: 19.2, ease: Easing.easeOutCubic })(time);
    const tOp = animate({ from: 0, to: 1, start: 19.4, end: 20.0, ease: Easing.easeOutCubic })(time);
    const tY = animate({ from: 8, to: 0, start: 19.4, end: 20.0, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 20 }}>
          <span className="mark" style={{ width: 80, height: 80, borderRadius: 20, fontSize: 36, transform: `scale(${markS * pulse})`, boxShadow: "0 0 40px rgba(16,185,129,0.3)" }}>P</span>
          <div style={{ fontSize: 80, fontWeight: 700, letterSpacing: "-0.04em", lineHeight: 1, display: "flex", gap: 16 }}>
            <span style={{ opacity: hOp, transform: `translateY(${hY}px)` }}>Hey</span>
            <span style={{ opacity: pOp, transform: `translateY(${pY}px)`, color: "var(--grn)" }}>Paula.</span>
          </div>
          <div style={{ fontSize: 20, color: "var(--dim)", opacity: tOp, transform: `translateY(${tY}px)` }}>
            your <span style={{ color: "var(--fg)" }}>swing-trading</span> copilot.
          </div>
          <div className="mono" style={{ fontSize: 12, color: "var(--dim)", letterSpacing: "0.15em", opacity: tOp, marginTop: 4 }}>
            v3.2
          </div>
        </div>
      </div>
    );
  }

  function Grain() { const{time}=useTimeline(); return <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.03,mixBlendMode:"overlay",pointerEvents:"none"}}><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed={Math.floor(time*8)%100}/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg> }
  function Vignette() { return <div style={{position:"absolute",inset:0,pointerEvents:"none",background:"radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.5) 100%)"}}/> }

  function Commercial() { return <><Bg/><Scene1/><Scene2/><Scene3/><Scene4/><Scene5/><Scene6/><Vignette/><Grain/></> }
  function Root() { return <Stage width={1920} height={1080} duration={DUR} background="#000"><Commercial/></Stage> }
  ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
  </script>
</body>
</html>
