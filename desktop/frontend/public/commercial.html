<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hey Paula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-2: #141420;
      --fg: #eaeaf2;
      --muted: #7a7a96;
      --accent: #10b981;
      --accent-on: #050507;
      --down: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; }
    body {
      background: #000; color: var(--fg);
      font: 16px/1.5 "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    .mono { font-family: "Geist Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .brand-mark {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); border-radius: 22%;
      font-family: "Geist Mono", monospace; font-weight: 800;
      color: var(--accent-on); font-size: inherit;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel">
  const DUR = 20;

  const EXCHANGES = [
    { q: "Hey Paula, what's the play today?", a: "Tech leading. SPY above VWAP — let winners run." },
    { q: "Hey Paula, find me a breakout.",    a: "AMD setting up. R/R 2.6×, score 78." },
    { q: "Hey Paula, can I hold NVDA?",       a: "Yes — trail your stop below the 20-EMA." },
    { q: "Hey Paula, recap my week.",         a: "Up +$1,284. 64% win rate. NVDA carried." },
    { q: "Hey Paula, size this trade.",       a: "Risk 1% — 45 shares, 3× ATR stop." },
    { q: "Hey Paula, hedge my book.",         a: "Reduce tech 20%. Concentration at 68%." },
  ];

  const STATS = [
    { n: "21", label: "signal factors", color: "var(--accent)" },
    { n: "5min", label: "scan cycles", color: "var(--accent)" },
    { n: "100+", label: "stocks tracked", color: "var(--accent)" },
    { n: "24/7", label: "autopilot", color: "var(--accent)" },
  ];

  function Bg() {
    const { time } = useTimeline();
    const drift = Math.sin(time * 0.3) * 40;
    const intensity = time > 6.5 && time < 9.5 ? 0.25 : 0.18;
    return (
      <div style={{
        position: "absolute", inset: 0,
        background:
          `radial-gradient(900px 600px at ${60 + drift / 5}% ${30 - drift / 8}%, rgba(16,185,129,${intensity}) 0%, transparent 60%),` +
          `radial-gradient(900px 600px at ${30 - drift / 6}% ${85 + drift / 10}%, rgba(16,185,129,0.09) 0%, transparent 60%),` +
          "var(--bg)",
        transition: "background 0.5s",
      }} />
    );
  }

  // ── Scene 1a: brand intro (0 – 2.8) ──
  function Scene1a() {
    const { time } = useTimeline();
    const sceneOp = animate({ from: 0, to: 1, start: 0.0, end: 0.5 })(time)
                  * (1 - animate({ from: 0, to: 1, start: 2.4, end: 2.8 })(time));
    const markScale = animate({ from: 0.7, to: 1, start: 0.2, end: 1.0, ease: Easing.easeOutBack })(time);
    const markOp    = animate({ from: 0, to: 1, start: 0.2, end: 0.8, ease: Easing.easeOutCubic })(time);
    const wordOp    = animate({ from: 0, to: 1, start: 0.8, end: 1.6, ease: Easing.easeOutCubic })(time);
    const wordY     = animate({ from: 22, to: 0, start: 0.8, end: 1.6, ease: Easing.easeOutCubic })(time);
    const pulse     = 1 + 0.03 * Math.sin((time - 0.2) * 3.0);
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: sceneOp }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 32 }}>
          <span className="brand-mark" style={{
            width: 160, height: 160, borderRadius: 36, fontSize: 72,
            transform: `scale(${markScale * pulse})`, opacity: markOp,
            boxShadow: "0 0 80px rgba(16,185,129,0.45)",
          }}>P</span>
          <div style={{
            fontSize: 156, fontWeight: 600, letterSpacing: "-0.05em", lineHeight: 1,
            opacity: wordOp, transform: `translateY(${wordY}px)`, color: "var(--fg)",
          }}>Paula</div>
        </div>
      </div>
    );
  }

  // ── Scene 1b: first chat exchange with typing (2.8 – 6.5) ──
  function Scene1b() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 2.8, end: 3.4, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 6.0, end: 6.5 })(time));
    const enterY = animate({ from: 30, to: 0, start: 2.8, end: 3.4, ease: Easing.easeOutCubic })(time);

    const userOp = animate({ from: 0, to: 1, start: 3.2, end: 3.8, ease: Easing.easeOutCubic })(time);
    const userY  = animate({ from: 18, to: 0, start: 3.2, end: 3.8, ease: Easing.easeOutCubic })(time);
    const avatarOp = animate({ from: 0, to: 1, start: 4.0, end: 4.4 })(time);
    const typingOp = animate({ from: 0, to: 1, start: 4.2, end: 4.5 })(time)
                   * (1 - animate({ from: 0, to: 1, start: 4.7, end: 4.9 })(time));
    const reply = EXCHANGES[0].a;
    const streamT = animate({ from: 0, to: 1, start: 4.9, end: 5.8, ease: Easing.linear })(time);
    const shown = reply.slice(0, Math.floor(streamT * reply.length));
    const caret = time > 4.9 && streamT < 1 && (Math.floor(time * 2) % 2 === 0);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{
          width: 1000, maxWidth: "90%", background: "var(--bg-2)",
          border: "1px solid rgba(255,255,255,0.08)", borderRadius: 24,
          padding: "32px 36px", boxShadow: "0 40px 100px rgba(0,0,0,0.5)",
          display: "flex", flexDirection: "column", gap: 28,
          transform: `translateY(${enterY}px)`,
        }}>
          <div style={{ alignSelf: "flex-end", opacity: userOp, transform: `translateY(${userY}px)` }}>
            <div style={{
              background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.06)",
              padding: "14px 20px", borderRadius: 20, fontSize: 28, color: "var(--fg)",
            }}>{EXCHANGES[0].q}</div>
          </div>
          {avatarOp > 0 && (
            <div style={{ display: "grid", gridTemplateColumns: "52px 1fr", gap: 18, alignItems: "flex-start" }}>
              <span className="brand-mark" style={{
                width: 44, height: 44, borderRadius: 12, fontSize: 20,
                opacity: avatarOp, boxShadow: "0 0 20px rgba(16,185,129,0.3)",
              }}>P</span>
              <div style={{ fontSize: 28, lineHeight: 1.5, color: "var(--fg)", minHeight: 44 }}>
                {time < 4.9 ? (
                  <div style={{ display: "inline-flex", gap: 7, padding: "10px 0", opacity: typingOp }}>
                    {[0,1,2].map(i => <span key={i} style={{ width: 9, height: 9, borderRadius: 999, background: "var(--muted)", opacity: 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(time * 5 + i * 0.7)) }} />)}
                  </div>
                ) : (
                  <>{shown}{caret && <span style={{ display: "inline-block", width: 9, height: "1em", background: "var(--accent)", verticalAlign: "-1px", marginLeft: 2 }} />}</>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Scene 1c: stats burst (6.5 – 9.5) ──
  function SceneStats() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 6.5, end: 7.0, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 9.0, end: 9.5 })(time));

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 40, maxWidth: 900 }}>
          {STATS.map((s, i) => {
            const delay = i * 0.25;
            const sOp = animate({ from: 0, to: 1, start: 6.8 + delay, end: 7.3 + delay, ease: Easing.easeOutCubic })(time);
            const sY = animate({ from: 40, to: 0, start: 6.8 + delay, end: 7.3 + delay, ease: Easing.easeOutBack })(time);
            const sScale = animate({ from: 0.8, to: 1, start: 6.8 + delay, end: 7.3 + delay, ease: Easing.easeOutBack })(time);
            return (
              <div key={i} style={{
                textAlign: "center", opacity: sOp,
                transform: `translateY(${sY}px) scale(${sScale})`,
              }}>
                <div className="mono" style={{
                  fontSize: 96, fontWeight: 700, lineHeight: 1, color: s.color,
                  textShadow: "0 0 60px rgba(16,185,129,0.3)",
                }}>{s.n}</div>
                <div style={{
                  fontSize: 22, color: "var(--muted)", letterSpacing: "0.08em",
                  textTransform: "uppercase", marginTop: 8,
                }}>{s.label}</div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Scene 1d: rapid prompt cycling (9.5 – 12.5) ──
  function SceneCycle() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 9.5, end: 10.0, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 12.0, end: 12.5 })(time));

    const CYCLE_START = 9.8;
    const DWELL = 0.45;
    let idx = 0;
    let localT = 0;
    if (time >= CYCLE_START) {
      const t = time - CYCLE_START;
      idx = Math.min(EXCHANGES.length - 1, Math.floor(t / DWELL));
      localT = (t - idx * DWELL) / DWELL;
    }

    const flipIn = Math.min(1, localT / 0.2);
    const flipOut = idx === EXCHANGES.length - 1 ? 0 : Math.min(1, Math.max(0, (localT - 0.8) / 0.2));
    const rotX = -90 * (1 - Easing.easeOutCubic(flipIn)) + 90 * Easing.easeInCubic(flipOut);
    const itemOp = flipIn * (1 - flipOut);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ width: 1000, maxWidth: "90%", perspective: 1600 }}>
          <div style={{
            transform: `rotateX(${rotX}deg)`, opacity: itemOp,
            transformOrigin: "center", transformStyle: "preserve-3d",
          }}>
            {/* User prompt */}
            <div style={{ textAlign: "right", marginBottom: 24 }}>
              <span style={{
                display: "inline-block", background: "rgba(255,255,255,0.07)",
                border: "1px solid rgba(255,255,255,0.06)",
                padding: "14px 22px", borderRadius: 20, fontSize: 28, color: "var(--fg)",
              }}>{EXCHANGES[idx].q}</span>
            </div>
            {/* Paula reply */}
            <div style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
              <span className="brand-mark" style={{
                width: 40, height: 40, borderRadius: 10, fontSize: 18, flexShrink: 0,
                boxShadow: "0 0 16px rgba(16,185,129,0.3)",
              }}>P</span>
              <div style={{ fontSize: 28, lineHeight: 1.5, color: "var(--fg)" }}>
                {EXCHANGES[idx].a}
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 2: "your AI trading assistant" (12.5 – 15.2) ──
  function Scene2() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 12.5, end: 13.1, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 14.8, end: 15.2 })(time));

    const words = ["your", "AI", "trading", "assistant."];
    const startW = 12.7;
    const stepW = 0.24;

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center" }}>
          <div style={{
            fontSize: 84, fontWeight: 500, letterSpacing: "-0.03em", lineHeight: 1.15,
            display: "flex", flexWrap: "wrap", gap: "0.3em", justifyContent: "center",
            color: "var(--muted)",
          }}>
            {words.map((w, i) => {
              const wOp = animate({ from: 0, to: 1, start: startW + i * stepW, end: startW + i * stepW + 0.4, ease: Easing.easeOutCubic })(time);
              const wY  = animate({ from: 18, to: 0, start: startW + i * stepW, end: startW + i * stepW + 0.4, ease: Easing.easeOutCubic })(time);
              return <span key={i} style={{ opacity: wOp, transform: `translateY(${wY}px)`, display: "inline-block" }}>{w}</span>;
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 3: outro — "Hey Paula. for everything trading." ──
  function Scene3() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 15.2, end: 15.8, ease: Easing.easeOutCubic })(time);
    const markScale = animate({ from: 0.82, to: 1, start: 15.2, end: 16.0, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.025 * Math.sin((time - 15.2) * 3.0);

    const heyOp   = animate({ from: 0, to: 1, start: 15.7, end: 16.3, ease: Easing.easeOutCubic })(time);
    const heyY    = animate({ from: 16, to: 0, start: 15.7, end: 16.3, ease: Easing.easeOutCubic })(time);
    const paulaOp = animate({ from: 0, to: 1, start: 16.1, end: 16.7, ease: Easing.easeOutCubic })(time);
    const paulaY  = animate({ from: 16, to: 0, start: 16.1, end: 16.7, ease: Easing.easeOutCubic })(time);

    const tagOp = animate({ from: 0, to: 1, start: 16.8, end: 17.5, ease: Easing.easeOutCubic })(time);
    const tagY  = animate({ from: 12, to: 0, start: 16.8, end: 17.5, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 28 }}>
          {/* Logo */}
          <span className="brand-mark" style={{
            width: 124, height: 124, borderRadius: 28, fontSize: 56,
            transform: `scale(${markScale * pulse})`,
            boxShadow: "0 0 70px rgba(16,185,129,0.45)",
          }}>P</span>

          {/* "Hey Paula." headline */}
          <div style={{
            fontSize: 124, fontWeight: 600, letterSpacing: "-0.04em", lineHeight: 1,
            display: "flex", gap: 28,
          }}>
            <span style={{ opacity: heyOp, transform: `translateY(${heyY}px)` }}>Hey</span>
            <span style={{
              opacity: paulaOp, transform: `translateY(${paulaY}px)`, color: "var(--accent)",
            }}>Paula.</span>
          </div>

          {/* Tagline */}
          <div style={{
            fontSize: 30, color: "var(--muted)", letterSpacing: "-0.01em",
            opacity: tagOp, transform: `translateY(${tagY}px)`,
            textAlign: "center", maxWidth: 900,
          }}>
            for <span style={{ color: "var(--fg)" }}>everything</span> trading.
          </div>
        </div>
      </div>
    );
  }

  function FilmGrain() {
    const { time } = useTimeline();
    const seed = Math.floor(time * 8) % 100;
    return (
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.05, mixBlendMode: "overlay", pointerEvents: "none" }}>
        <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed={seed} /></filter>
        <rect width="100%" height="100%" filter="url(#g)" />
      </svg>
    );
  }

  function Vignette() {
    return (
      <div style={{
        position: "absolute", inset: 0, pointerEvents: "none",
        background: "radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.65) 100%)",
      }} />
    );
  }

  function Commercial() {
    return (
      <>
        <Bg />
        <Scene1a />
        <Scene1b />
        <SceneStats />
        <SceneCycle />
        <Scene2 />
        <Scene3 />
        <Vignette />
        <FilmGrain />
      </>
    );
  }

  function Root() {
    return (
      <Stage width={1920} height={1080} duration={DUR} background="#000">
        <Commercial />
      </Stage>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
</html>
