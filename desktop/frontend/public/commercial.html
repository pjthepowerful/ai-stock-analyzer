<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hey Paula</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#050507; --bg2:#0c0c12; --fg:#eaeaf2; --dim:#7a7a96; --grn:#10b981; --grn2:#34d399; --red:#ef4444 }
    * { box-sizing: border-box; margin: 0 }
    html, body, #root { height: 100% }
    body { background: #000; color: var(--fg); font: 16px/1.5 "Outfit", system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden }
    .mono { font-family: "JetBrains Mono", monospace }
    .mark { display: inline-flex; align-items: center; justify-content: center; background: var(--grn); border-radius: 22%; font-family: "JetBrains Mono", monospace; font-weight: 800; color: var(--bg) }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel">

  const DUR = 22;

  const CHATS = [
    { q: "Hey Paula, what's the play?",   a: "Tech leading. SPY above VWAP." },
    { q: "Hey Paula, find a breakout.",    a: "AMD. R/R 2.6×, score 78." },
    { q: "Hey Paula, can I hold NVDA?",    a: "Yes. Trail below the 20-EMA." },
    { q: "Hey Paula, recap my week.",      a: "+$1,284. 64% win rate." },
    { q: "Hey Paula, size this trade.",    a: "45 shares. 3× ATR stop." },
    { q: "Hey Paula, what should I buy?",  a: "INTC breaking out. Score 82." },
  ];

  // ── Background ──
  function Bg() {
    const { time } = useTimeline();
    const d = Math.sin(time * 0.2) * 30;
    const glow = time > 5 && time < 8 ? 0.22 : time > 14 ? 0.2 : 0.12;
    return <div style={{ position: "absolute", inset: 0, background: `radial-gradient(700px 500px at ${52+d/5}% ${40-d/6}%, rgba(16,185,129,${glow}) 0%, transparent 55%), var(--bg)`, transition: "background 0.8s" }} />;
  }

  // ── Scene 1: "Hey Paula." opens big (0 – 3) ──
  function SceneOpen() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 0.15, end: 0.6, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 2.4, end: 3.0, ease: Easing.easeInCubic })(time));
    const heyOp = animate({ from: 0, to: 1, start: 0.2, end: 0.7, ease: Easing.easeOutCubic })(time);
    const heyY = animate({ from: 20, to: 0, start: 0.2, end: 0.7, ease: Easing.easeOutCubic })(time);
    const paulaOp = animate({ from: 0, to: 1, start: 0.5, end: 1.0, ease: Easing.easeOutCubic })(time);
    const paulaY = animate({ from: 20, to: 0, start: 0.5, end: 1.0, ease: Easing.easeOutCubic })(time);
    const subOp = animate({ from: 0, to: 1, start: 1.2, end: 1.8, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 120, fontWeight: 700, letterSpacing: "-0.04em", lineHeight: 1, display: "flex", gap: 20, justifyContent: "center" }}>
            <span style={{ opacity: heyOp, transform: `translateY(${heyY}px)`, color: "var(--fg)" }}>Hey</span>
            <span style={{ opacity: paulaOp, transform: `translateY(${paulaY}px)`, color: "var(--grn)" }}>Paula.</span>
          </div>
          <div style={{ fontSize: 22, color: "var(--dim)", marginTop: 20, opacity: subOp, letterSpacing: "0.02em" }}>
            your AI trading assistant
          </div>
        </div>
      </div>
    );
  }

  // ── Scene 2: first chat with typing (3 – 7) ──
  function SceneChat() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 3.0, end: 3.5, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 6.4, end: 7.0, ease: Easing.easeInCubic })(time));
    const boxY = animate({ from: 20, to: 0, start: 3.0, end: 3.5, ease: Easing.easeOutCubic })(time);
    const uOp = animate({ from: 0, to: 1, start: 3.3, end: 3.7, ease: Easing.easeOutCubic })(time);
    const avOp = animate({ from: 0, to: 1, start: 4.0, end: 4.3 })(time);
    const dotsOp = animate({ from: 0, to: 1, start: 4.1, end: 4.3 })(time) * (1 - animate({ from: 0, to: 1, start: 4.6, end: 4.8 })(time));
    const reply = CHATS[0].a;
    const stream = animate({ from: 0, to: 1, start: 4.8, end: 5.8 })(time);
    const shown = reply.slice(0, Math.floor(stream * reply.length));
    const caret = time > 4.8 && stream < 1 && Math.sin(time * 3.5) > 0;

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ width: 820, maxWidth: "85%", background: "var(--bg2)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 18, padding: "24px 28px", boxShadow: "0 24px 60px rgba(0,0,0,0.4)", display: "flex", flexDirection: "column", gap: 20, transform: `translateY(${boxY}px)` }}>
          <div style={{ alignSelf: "flex-end", opacity: uOp }}>
            <div style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.04)", padding: "10px 16px", borderRadius: 14, fontSize: 22, color: "var(--fg)" }}>{CHATS[0].q}</div>
          </div>
          {avOp > 0 && (
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <span className="mark" style={{ width: 34, height: 34, borderRadius: 9, fontSize: 14, flexShrink: 0, opacity: avOp, boxShadow: "0 0 14px rgba(16,185,129,0.2)" }}>P</span>
              <div style={{ fontSize: 22, lineHeight: 1.5, color: "var(--fg)", minHeight: 34 }}>
                {time < 4.8 ? <div style={{ display: "flex", gap: 5, padding: "6px 0", opacity: dotsOp }}>{[0,1,2].map(i => <span key={i} style={{ width: 6, height: 6, borderRadius: 99, background: "var(--dim)", opacity: 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(time * 5.5 + i * 0.8)) }} />)}</div>
                : <>{shown}{caret && <span style={{ display: "inline-block", width: 2, height: "1em", background: "var(--grn)", marginLeft: 2 }} />}</>}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── Scene 3: stats (7 – 10) ──
  function SceneStats() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 7.0, end: 7.5, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 9.4, end: 10.0, ease: Easing.easeInCubic })(time));
    const stats = [{ n: "21", l: "signal factors" }, { n: "5min", l: "scan cycles" }, { n: "100+", l: "stocks" }, { n: "24/7", l: "autopilot" }];
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32, maxWidth: 700 }}>
          {stats.map((s, i) => {
            const d = i * 0.2;
            const sOp = animate({ from: 0, to: 1, start: 7.2 + d, end: 7.7 + d, ease: Easing.easeOutCubic })(time);
            const sY = animate({ from: 28, to: 0, start: 7.2 + d, end: 7.7 + d, ease: Easing.easeOutBack })(time);
            return <div key={i} style={{ textAlign: "center", opacity: sOp, transform: `translateY(${sY}px)` }}>
              <div className="mono" style={{ fontSize: 72, fontWeight: 700, color: "var(--grn)", textShadow: "0 0 40px rgba(16,185,129,0.25)" }}>{s.n}</div>
              <div style={{ fontSize: 16, color: "var(--dim)", letterSpacing: "0.1em", textTransform: "uppercase", marginTop: 4 }}>{s.l}</div>
            </div>;
          })}
        </div>
      </div>
    );
  }

  // ── Scene 4: tagline (10 – 12) ──
  function SceneTagline() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 10.0, end: 10.5, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 11.4, end: 12.0, ease: Easing.easeInCubic })(time));
    const words = ["fully", "automated", "AI", "trading."];
    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ fontSize: 68, fontWeight: 700, letterSpacing: "-0.03em", display: "flex", gap: "0.22em", justifyContent: "center", flexWrap: "wrap" }}>
          {words.map((w, i) => {
            const wOp = animate({ from: 0, to: 1, start: 10.2 + i * 0.16, end: 10.2 + i * 0.16 + 0.3, ease: Easing.easeOutCubic })(time);
            const wY = animate({ from: 16, to: 0, start: 10.2 + i * 0.16, end: 10.2 + i * 0.16 + 0.3, ease: Easing.easeOutCubic })(time);
            const accent = w === "AI";
            return <span key={i} style={{ opacity: wOp, transform: `translateY(${wY}px)`, display: "inline-block", color: accent ? "var(--grn)" : "var(--fg)", textShadow: accent ? "0 0 30px rgba(16,185,129,0.35)" : "none" }}>{w}</span>;
          })}
        </div>
      </div>
    );
  }

  // ── Scene 5: chat cascade (12 – 17) ──
  function SceneCascade() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 12.0, end: 12.5, ease: Easing.easeOutCubic })(time)
             * (1 - animate({ from: 0, to: 1, start: 16.4, end: 17.0, ease: Easing.easeInCubic })(time));
    const START = 12.3;
    const GAP = 0.6;
    const visCount = Math.min(CHATS.length, Math.floor(Math.max(0, time - START) / GAP) + 1);
    const scrollPx = Math.max(0, (visCount - 3)) * 70;
    const scrollY = animate({ from: 0, to: -scrollPx, start: START + GAP * 2.5, end: START + GAP * 5, ease: Easing.easeInOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", opacity: op, overflow: "hidden" }}>
        <div style={{ width: 680, maxWidth: "80%", transform: `translateY(${scrollY}px)`, display: "flex", flexDirection: "column", gap: 12 }}>
          {CHATS.map((m, i) => {
            const t = START + i * GAP;
            const mOp = animate({ from: 0, to: 1, start: t, end: t + 0.35, ease: Easing.easeOutCubic })(time);
            const mY = animate({ from: 12, to: 0, start: t, end: t + 0.4, ease: Easing.easeOutCubic })(time);
            if (mOp <= 0) return null;
            return (
              <div key={i} style={{ opacity: mOp, transform: `translateY(${mY}px)`, display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ alignSelf: "flex-end" }}>
                  <span style={{ display: "inline-block", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.03)", padding: "6px 14px", borderRadius: 12, fontSize: 15, color: "var(--fg)" }}>{m.q}</span>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "flex-start" }}>
                  <span className="mark" style={{ width: 22, height: 22, borderRadius: 6, fontSize: 9, flexShrink: 0 }}>P</span>
                  <span style={{ fontSize: 15, color: "var(--dim)", lineHeight: 1.45 }}>{m.a}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── Scene 6: outro (17 – 22) ──
  function SceneOutro() {
    const { time } = useTimeline();
    const op = animate({ from: 0, to: 1, start: 17.0, end: 17.6, ease: Easing.easeOutCubic })(time);
    const markS = animate({ from: 0.7, to: 1, start: 17.0, end: 17.8, ease: Easing.easeOutBack })(time);
    const pulse = 1 + 0.02 * Math.sin((time - 17) * 2.5);
    const hOp = animate({ from: 0, to: 1, start: 17.4, end: 17.9, ease: Easing.easeOutCubic })(time);
    const hY = animate({ from: 12, to: 0, start: 17.4, end: 17.9, ease: Easing.easeOutCubic })(time);
    const pOp = animate({ from: 0, to: 1, start: 17.7, end: 18.2, ease: Easing.easeOutCubic })(time);
    const pY = animate({ from: 12, to: 0, start: 17.7, end: 18.2, ease: Easing.easeOutCubic })(time);
    const tOp = animate({ from: 0, to: 1, start: 18.4, end: 19.0, ease: Easing.easeOutCubic })(time);
    const tY = animate({ from: 10, to: 0, start: 18.4, end: 19.0, ease: Easing.easeOutCubic })(time);

    return (
      <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", opacity: op }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 20 }}>
          <span className="mark" style={{ width: 88, height: 88, borderRadius: 22, fontSize: 40, transform: `scale(${markS * pulse})`, boxShadow: "0 0 50px rgba(16,185,129,0.35)" }}>P</span>
          <div style={{ fontSize: 88, fontWeight: 700, letterSpacing: "-0.04em", lineHeight: 1, display: "flex", gap: 18 }}>
            <span style={{ opacity: hOp, transform: `translateY(${hY}px)` }}>Hey</span>
            <span style={{ opacity: pOp, transform: `translateY(${pY}px)`, color: "var(--grn)" }}>Paula.</span>
          </div>
          <div style={{ fontSize: 22, color: "var(--dim)", opacity: tOp, transform: `translateY(${tY}px)` }}>
            for <span style={{ color: "var(--fg)" }}>everything</span> trading.
          </div>
        </div>
      </div>
    );
  }

  function Grain() { const{time}=useTimeline(); return <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.035,mixBlendMode:"overlay",pointerEvents:"none"}}><filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed={Math.floor(time*8)%100}/></filter><rect width="100%" height="100%" filter="url(#g)"/></svg> }
  function Vignette() { return <div style={{position:"absolute",inset:0,pointerEvents:"none",background:"radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%)"}}/> }

  // ── Cinematic Audio Engine ──
  let _ctx = null, _reverb = null;
  function ctx() {
    if (!_ctx) {
      _ctx = new (window.AudioContext || window.webkitAudioContext)()
      // Create reverb convolver
      const len = _ctx.sampleRate * 1.5, buf = _ctx.createBuffer(2, len, _ctx.sampleRate)
      for (let ch = 0; ch < 2; ch++) {
        const d = buf.getChannelData(ch)
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5)
      }
      _reverb = _ctx.createConvolver(); _reverb.buffer = buf
      const wet = _ctx.createGain(); wet.gain.value = 0.15
      _reverb.connect(wet); wet.connect(_ctx.destination)
    }
    if (_ctx.state === 'suspended') _ctx.resume()
    return _ctx
  }
  function out(dry) { const c = ctx(); dry.connect(c.destination); dry.connect(_reverb); return c }

  // Soft impact — opening/outro
  function sfxImpact() {
    const c = ctx()
    // Sub layer
    const o1 = c.createOscillator(), g1 = c.createGain()
    o1.type = 'sine'; o1.frequency.setValueAtTime(60, c.currentTime)
    o1.frequency.exponentialRampToValueAtTime(30, c.currentTime + 0.8)
    g1.gain.setValueAtTime(0.15, c.currentTime)
    g1.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.8)
    o1.connect(g1); out(g1)
    o1.start(c.currentTime); o1.stop(c.currentTime + 0.8)
    // Click layer
    const o2 = c.createOscillator(), g2 = c.createGain()
    o2.type = 'triangle'; o2.frequency.setValueAtTime(2000, c.currentTime)
    o2.frequency.exponentialRampToValueAtTime(200, c.currentTime + 0.05)
    g2.gain.setValueAtTime(0.08, c.currentTime)
    g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08)
    o2.connect(g2); out(g2)
    o2.start(c.currentTime); o2.stop(c.currentTime + 0.1)
  }

  // Soft whoosh
  function sfxWhoosh() {
    const c = ctx(), len = c.sampleRate * 0.3
    const buf = c.createBuffer(1, len, c.sampleRate)
    const d = buf.getChannelData(0)
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.sin(Math.PI * i / len)
    const src = c.createBufferSource(), f = c.createBiquadFilter(), g = c.createGain()
    src.buffer = buf; f.type = 'bandpass'; f.frequency.setValueAtTime(1200, c.currentTime)
    f.Q.value = 2; g.gain.setValueAtTime(0.06, c.currentTime)
    src.connect(f); f.connect(g); out(g)
    src.start(c.currentTime)
  }

  // Glass chime
  function sfxChime(note) {
    const c = ctx(), freqs = [880, 1108, 1318, 1568]
    const freq = freqs[note % 4]
    const o = c.createOscillator(), g = c.createGain()
    o.type = 'sine'; o.frequency.setValueAtTime(freq, c.currentTime)
    g.gain.setValueAtTime(0.05, c.currentTime)
    g.gain.setValueAtTime(0.05, c.currentTime + 0.02)
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 1.2)
    o.connect(g); out(g)
    o.start(c.currentTime); o.stop(c.currentTime + 1.2)
    // Harmonic
    const o2 = c.createOscillator(), g2 = c.createGain()
    o2.type = 'sine'; o2.frequency.setValueAtTime(freq * 2.01, c.currentTime)
    g2.gain.setValueAtTime(0.015, c.currentTime)
    g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.8)
    o2.connect(g2); out(g2)
    o2.start(c.currentTime); o2.stop(c.currentTime + 0.8)
  }

  // Soft key tick
  function sfxTick() {
    const c = ctx(), o = c.createOscillator(), g = c.createGain()
    o.type = 'sine'; o.frequency.setValueAtTime(3000 + Math.random() * 1000, c.currentTime)
    g.gain.setValueAtTime(0.015, c.currentTime)
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.025)
    o.connect(g); g.connect(c.destination)
    o.start(c.currentTime); o.stop(c.currentTime + 0.03)
  }

  // Rising shimmer
  function sfxShimmer() {
    const c = ctx()
    for (let i = 0; i < 5; i++) {
      const o = c.createOscillator(), g = c.createGain()
      o.type = 'sine'; o.frequency.setValueAtTime(400 + i * 200, c.currentTime + i * 0.06)
      o.frequency.exponentialRampToValueAtTime(800 + i * 300, c.currentTime + i * 0.06 + 0.5)
      g.gain.setValueAtTime(0.02, c.currentTime + i * 0.06)
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.06 + 0.7)
      o.connect(g); out(g)
      o.start(c.currentTime + i * 0.06); o.stop(c.currentTime + i * 0.06 + 0.7)
    }
  }

  // Resolve — warm major chord with slow release
  function sfxResolve() {
    const c = ctx()
    ;[261.6, 329.6, 392, 523.2].forEach((freq, i) => {
      const o = c.createOscillator(), g = c.createGain()
      o.type = 'sine'; o.frequency.setValueAtTime(freq, c.currentTime + i * 0.1)
      g.gain.setValueAtTime(0, c.currentTime + i * 0.1)
      g.gain.linearRampToValueAtTime(0.05, c.currentTime + i * 0.1 + 0.05)
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.1 + 2.5)
      o.connect(g); out(g)
      o.start(c.currentTime + i * 0.1); o.stop(c.currentTime + i * 0.1 + 2.5)
      // Add octave
      const o2 = c.createOscillator(), g2 = c.createGain()
      o2.type = 'sine'; o2.frequency.setValueAtTime(freq * 2, c.currentTime + i * 0.1)
      g2.gain.setValueAtTime(0, c.currentTime + i * 0.1)
      g2.gain.linearRampToValueAtTime(0.015, c.currentTime + i * 0.1 + 0.05)
      g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + i * 0.1 + 1.5)
      o2.connect(g2); out(g2)
      o2.start(c.currentTime + i * 0.1); o2.stop(c.currentTime + i * 0.1 + 1.5)
    })
  }

  // ── SFX Timeline ──
  function SFXLayer() {
    const { time } = useTimeline();
    const fired = React.useRef(new Set());
    const lastTime = React.useRef(0);
    if (time < lastTime.current - 1) fired.current.clear()
    lastTime.current = time;

    const at = (id, t, fn) => { if (time >= t && !fired.current.has(id)) { fired.current.add(id); fn() } }

    // Opening
    at('open', 0.15, sfxImpact)

    // Chat transition
    at('chat', 3.0, sfxWhoosh)

    // Typing ticks during stream
    for (let i = 0; i < 8; i++) at('t'+i, 4.85 + i * 0.1, sfxTick)

    // Stats — glass chimes ascending
    at('s0', 7.3, () => sfxChime(0))
    at('s1', 7.5, () => sfxChime(1))
    at('s2', 7.7, () => sfxChime(2))
    at('s3', 7.9, () => sfxChime(3))

    // Tagline
    at('tw', 10.0, sfxWhoosh)
    at('ts', 10.3, sfxShimmer)

    // Cascade — subtle ticks
    for (let i = 0; i < 6; i++) at('c'+i, 12.3 + i * 0.6, sfxTick)

    // Outro
    at('oi', 17.0, sfxImpact)
    at('or', 18.4, sfxResolve)

    return null
  }

  function Commercial() { return <><Bg/><SceneOpen/><SceneChat/><SceneStats/><SceneTagline/><SceneCascade/><SceneOutro/><Vignette/><Grain/><SFXLayer/></> }
  function Root() { return <Stage width={1920} height={1080} duration={DUR} background="#000"><Commercial/></Stage> }
