<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Paula · Chat Shell Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0}
  body{background:#08080c;color:#ececf2;font-family:'DM Sans',system-ui,sans-serif;padding:26px}
  h1{font-size:21px;font-weight:700;margin-bottom:4px}
  .sub{color:#8a8a9a;font-size:14px;margin-bottom:20px}
  .seg{display:inline-flex;background:#14141c;border:1px solid #26262f;border-radius:10px;padding:4px;margin-bottom:22px;flex-wrap:wrap;gap:2px}
  .seg button{background:none;border:none;color:#8a8a9a;font:inherit;font-size:13px;font-weight:500;padding:9px 15px;border-radius:7px;cursor:pointer;transition:.15s}
  .seg button.on{background:#10b981;color:#04130d}
  .flabel{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#52525f;padding:0 0 8px 2px}
  .frame{border-radius:14px;overflow:hidden;border:1px solid #23232e;max-width:920px}
  .note{margin-top:18px;color:#8a8a9a;font-size:13px;line-height:1.6;max-width:780px}
  .note b{color:#c8c8d8}
  .mono{font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<h1>Paula · Chat shell concepts</h1>
<div class="sub">Same chat, different navigation chrome. The content stays — only the buttons/sidebar/header change. Pick what feels clean.</div>
<div class="seg" id="seg">
  <button data-c="rail" class="on">Icon rail (no top tabs)</button>
  <button data-c="floating">Floating pill nav</button>
  <button data-c="minimal">Minimal / hidden</button>
  <button data-c="toponly">Top-bar only</button>
</div>
<div id="render"></div>
<div class="note" id="note"></div>

<script>
const R=document.getElementById('render'),NOTE=document.getElementById('note');
let c='rail';

const chatBody = (pad='30px 26px')=>`
  <div style="max-width:600px;width:100%;margin:0 auto;flex:1;display:flex;flex-direction:column;padding:${pad};gap:20px;overflow:hidden">
    <div style="align-self:flex-end;background:#10b981;color:#04130d;padding:11px 16px;border-radius:16px 16px 4px 16px;font-size:14px;font-weight:500;max-width:75%">Find me some swing setups</div>
    <div style="align-self:flex-start;display:flex;gap:11px;max-width:90%">
      <span style="width:27px;height:27px;border-radius:50%;background:#1d9e75;color:#04130d;display:grid;place-items:center;font-weight:700;font-size:12px;flex-shrink:0">P</span>
      <div><div style="font-size:14px;line-height:1.6;color:#d4d4e0">Cleanest one right now is <b style="color:#fff">XOM</b> — pullback to the 20 SMA in an uptrend.</div>
      <div style="margin-top:10px;border:1px solid #1e1e27;border-radius:13px;background:#16161d;padding:13px"><div style="display:flex;justify-content:space-between;align-items:center"><span class="mono" style="font-weight:600">XOM</span><span style="font-size:11px;font-weight:600;background:#10b981;color:#04130d;border-radius:5px;padding:3px 9px">BUY · 84</span></div><div class="mono" style="display:flex;gap:16px;margin-top:10px;font-size:12px"><span style="color:#62627a">entry <b style="color:#ececf2">118.40</b></span><span style="color:#62627a">stop <b style="color:#ef4444">114.80</b></span><span style="color:#62627a">target <b style="color:#10b981">125.60</b></span></div></div></div>
    </div>
  </div>
  <div style="max-width:600px;width:100%;margin:0 auto;padding:14px 26px 22px"><div style="border:1px solid #26262f;border-radius:14px;background:#16161d;padding:13px 16px;display:flex;align-items:center;color:#62627a;font-size:14px">Ask Paula anything…<span style="margin-left:auto;width:32px;height:32px;border-radius:9px;background:#10b981"></span></div></div>`;

function rail(){ return `
<div class="frame"><div style="display:flex;height:540px;background:#101014;color:#ececf2">
  <div style="width:58px;border-right:1px solid #1e1e27;background:#0b0b10;display:flex;flex-direction:column;align-items:center;padding:14px 0;gap:6px">
    <span style="width:30px;height:30px;border-radius:9px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700;margin-bottom:10px">P</span>
    ${[['💬','Chat',1],['🔍','Analyze',0],['📊','Portfolio',0]].map(i=>`<div title="${i[1]}" style="width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:17px;background:${i[2]?'#16161d':'none'};color:${i[2]?'#10b981':'#62627a'}">${i[0]}</div>`).join('')}
    <div style="margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:10px"><div title="Settings" style="width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:16px;color:#62627a">⚙</div><span style="width:28px;height:28px;border-radius:50%;background:#1d9e75;color:#04130d;display:grid;place-items:center;font-weight:600;font-size:12px">PJ</span></div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column">
    <div style="height:48px;border-bottom:1px solid #1e1e27;display:flex;align-items:center;padding:0 22px;gap:14px">
      <span style="font-weight:600;font-size:14px">New chat</span>
      <span style="margin-left:auto;display:flex;align-items:center;gap:14px;font-size:12px">
        <span class="mono" style="color:#8a8a9a">$25,490 <span style="color:#ef4444">SPY −2.1%</span></span>
        <span style="display:flex;align-items:center;gap:6px;border:1px solid #1e1e27;border-radius:8px;padding:6px 11px;color:#8a8a9a"><span style="width:7px;height:7px;border-radius:50%;background:#62627a"></span>Autopilot</span>
      </span>
    </div>
    ${chatBody()}
  </div>
</div></div>`; }

function floating(){ return `
<div class="frame"><div style="height:540px;background:#101014;color:#ececf2;position:relative;display:flex;flex-direction:column">
  <div style="position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:4px;background:rgba(18,18,24,.9);backdrop-filter:blur(10px);border:1px solid #26262f;border-radius:999px;padding:5px">
    ${['Chat','Analyze','Portfolio'].map((t,i)=>`<span style="font-size:13px;font-weight:500;padding:7px 16px;border-radius:999px;background:${i===0?'#10b981':'none'};color:${i===0?'#04130d':'#8a8a9a'}">${t}</span>`).join('')}
  </div>
  <div style="position:absolute;top:18px;right:20px;z-index:5;display:flex;align-items:center;gap:10px">
    <span class="mono" style="font-size:12px;color:#8a8a9a">$25,490</span>
    <span style="width:30px;height:30px;border-radius:50%;background:#1d9e75;color:#04130d;display:grid;place-items:center;font-weight:600;font-size:12px">PJ</span>
  </div>
  <div style="position:absolute;top:18px;left:20px;z-index:5;width:30px;height:30px;border-radius:9px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700">P</div>
  <div style="flex:1;display:flex;flex-direction:column;padding-top:30px">${chatBody()}</div>
</div></div>`; }

function minimal(){ return `
<div class="frame"><div style="height:540px;background:#101014;color:#ececf2;display:flex;flex-direction:column;position:relative">
  <div style="position:absolute;top:16px;left:18px;z-index:5;display:flex;align-items:center;gap:10px"><span style="font-size:20px;color:#62627a">☰</span><span style="width:28px;height:28px;border-radius:8px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700">P</span></div>
  <div style="position:absolute;top:18px;right:18px;z-index:5;display:flex;align-items:center;gap:12px"><span class="mono" style="font-size:12px;color:#8a8a9a">$25,490 <span style="color:#ef4444">−2.1%</span></span><span style="width:28px;height:28px;border-radius:50%;background:#1d9e75;color:#04130d;display:grid;place-items:center;font-weight:600;font-size:12px">PJ</span></div>
  <div style="flex:1;display:flex;flex-direction:column;padding-top:30px">${chatBody('30px 26px')}</div>
</div></div>`; }

function toponly(){ return `
<div class="frame"><div style="height:540px;background:#101014;color:#ececf2;display:flex;flex-direction:column">
  <div style="height:54px;border-bottom:1px solid #1e1e27;display:flex;align-items:center;padding:0 20px;gap:16px;background:#0d0d12">
    <span style="width:28px;height:28px;border-radius:8px;background:#10b981;color:#04130d;display:grid;place-items:center;font-weight:700">P</span>
    <div style="display:flex;gap:2px;background:#16161d;border-radius:9px;padding:3px">${['Chat','Analyze','Portfolio'].map((t,i)=>`<span style="font-size:13px;font-weight:500;padding:6px 14px;border-radius:7px;background:${i===0?'#10b981':'none'};color:${i===0?'#04130d':'#8a8a9a'}">${t}</span>`).join('')}</div>
    <span style="margin-left:auto;display:flex;align-items:center;gap:12px"><span class="mono" style="font-size:12px;color:#8a8a9a">$25,490 <span style="color:#ef4444">SPY −2.1%</span></span><span style="width:30px;height:30px;border-radius:50%;background:#1d9e75;color:#04130d;display:grid;place-items:center;font-weight:600;font-size:12px">PJ</span></span>
  </div>
  ${chatBody()}
</div></div>`; }

const V={rail,floating,minimal,toponly};
const N={
  rail:`<b>Icon rail (no top tabs).</b> A thin left rail of icons replaces both the cluttered top tabs and the chat sidebar. Nav lives in one quiet column; the top bar shrinks to just the chat title + equity + a small autopilot toggle. Most space for the conversation. (Chat history would live in a panel that slides out from the rail.)`,
  floating:`<b>Floating pill nav.</b> No top bar at all — nav floats as a frosted pill centered at the top, logo top-left, account top-right. Feels light and modern, conversation goes edge to edge. Very "app-like."`,
  minimal:`<b>Minimal / hidden.</b> Almost no chrome — just a hamburger + logo top-left and equity + avatar top-right. Everything (nav, history, autopilot) lives behind the menu. Maximum focus on the chat. Cleanest, but nav is one tap away instead of always visible.`,
  toponly:`<b>Top-bar only (no sidebar).</b> Keep a single clean top bar with a compact segmented nav, kill the left sidebar entirely. Closest to what you have now but de-cluttered — one row, grouped tabs, less noise.`,
};
function render(){ R.innerHTML=`<div class="flabel">${({rail:'Icon rail',floating:'Floating pill nav',minimal:'Minimal / hidden',toponly:'Top-bar only'})[c]}</div>`+V[c](); NOTE.innerHTML=N[c]; }
document.getElementById('seg').addEventListener('click',e=>{ if(e.target.dataset.c){ c=e.target.dataset.c; [...e.currentTarget.children].forEach(b=>b.classList.toggle('on',b===e.target)); render(); }});
render();
</script>
</body>
</html>
